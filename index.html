<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kanban</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<style>
  :root {
    --bg: #fafaf9;
    --panel: #ffffff;
    --panel-2: #f5f5f4;
    --border: #e7e5e4;
    --text: #1c1917;
    --muted: #78716c;
    --accent: #0f766e;
    --accent-soft: #ccfbf1;
    --danger: #b91c1c;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
    --radius: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0c0a09;
      --panel: #1c1917;
      --panel-2: #292524;
      --border: #44403c;
      --text: #fafaf9;
      --muted: #a8a29e;
      --accent: #2dd4bf;
      --accent-soft: #134e4a;
      --danger: #f87171;
      --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.3);
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    margin: 0; font-size: 16px; font-weight: 600; letter-spacing: -0.01em;
  }
  header .actions { display: flex; gap: 8px; align-items: center; }
  button {
    font: inherit; color: var(--text); background: var(--panel);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; cursor: pointer;
  }
  button:hover { background: var(--panel-2); }
  button.ghost { border-color: transparent; background: transparent; color: var(--muted); }
  button.ghost:hover { color: var(--text); background: var(--panel-2); }
  main {
    display: grid;
    grid-template-columns: repeat(5, minmax(240px, 1fr));
    gap: 12px;
    padding: 16px 24px 24px;
    flex: 1; min-height: 0;
    overflow-x: auto;
  }
  .col {
    display: flex; flex-direction: column;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    min-height: 0;
  }
  .col-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .col-title {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 999px;
    font-weight: 500; font-size: 13px;
    background: var(--panel-2); color: var(--muted);
  }
  .dot { width: 7px; height: 7px; border-radius: 999px; background: var(--muted); }
  .col[data-status="inbox"]       .col-title { background: #f1f5f9; color: #475569; }
  .col[data-status="inbox"]       .dot { background: #94a3b8; }
  .col[data-status="not-started"] .col-title { background: #f1f5f9; color: #475569; }
  .col[data-status="not-started"] .dot { background: #94a3b8; }
  .col[data-status="in-progress"] .col-title { background: #dbeafe; color: #1e3a8a; }
  .col[data-status="in-progress"] .dot { background: #3b82f6; }
  .col[data-status="focus"]       .col-title { background: #fce7f3; color: #9d174d; }
  .col[data-status="focus"]       .dot { background: #ec4899; }
  .col[data-status="done"]        .col-title { background: #d1fae5; color: #065f46; }
  .col[data-status="done"]        .dot { background: #10b981; }
  @media (prefers-color-scheme: dark) {
    .col[data-status="inbox"]       .col-title { background: #1e293b; color: #cbd5e1; }
    .col[data-status="not-started"] .col-title { background: #1e293b; color: #cbd5e1; }
    .col[data-status="in-progress"] .col-title { background: #1e3a8a40; color: #93c5fd; }
    .col[data-status="focus"]       .col-title { background: #831843; color: #fbcfe8; }
    .col[data-status="done"]        .col-title { background: #064e3b; color: #6ee7b7; }
  }
  .col.over-cap .col-head { background: #fee2e2; }
  @media (prefers-color-scheme: dark) {
    .col.over-cap .col-head { background: #450a0a; }
  }
  .count { color: var(--muted); font-weight: 500; font-size: 12px; }
  .cards {
    flex: 1; overflow-y: auto; padding: 10px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .cards.drag-over { background: var(--accent-soft); }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    box-shadow: var(--shadow);
    cursor: grab;
    position: relative;
  }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: 0.4; }
  .card.focused {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  .card .title {
    outline: none; min-height: 1.4em; word-break: break-word;
  }
  .card .title[contenteditable="true"]:focus {
    background: var(--accent-soft); border-radius: 4px;
  }
  .card .meta {
    margin-top: 6px; font-size: 11px; color: var(--muted);
    display: flex; justify-content: space-between; align-items: center;
  }
  .col[data-status="done"] .card .title { text-decoration: line-through; color: var(--muted); }
  .badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .badge {
    font-size: 11px; line-height: 1; padding: 4px 8px; border-radius: 999px;
    border: 1px solid var(--border); color: var(--muted); white-space: nowrap;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .badge.context-Personal { background: #dbeafe; color: #1e3a8a; border-color: transparent; }
  .badge.context-Work     { background: #ede9fe; color: #5b21b6; border-color: transparent; }
  @media (prefers-color-scheme: dark) {
    .badge.context-Personal { background: #1e3a8a; color: #dbeafe; }
    .badge.context-Work     { background: #4c1d95; color: #ede9fe; }
  }
  .badge.effort { font-weight: 600; letter-spacing: 0.02em; border-color: transparent; }
  .badge.effort-S { background: #d1fae5; color: #065f46; }
  .badge.effort-M { background: #fef3c7; color: #92400e; }
  .badge.effort-L { background: #fee2e2; color: #991b1b; }
  .badge.effort-XL { background: #fce7f3; color: #9d174d; }
  @media (prefers-color-scheme: dark) {
    .badge.effort-S  { background: #064e3b; color: #6ee7b7; }
    .badge.effort-M  { background: #78350f; color: #fde68a; }
    .badge.effort-L  { background: #7f1d1d; color: #fecaca; }
    .badge.effort-XL { background: #831843; color: #fbcfe8; }
  }
  .badge.staleness { background: var(--panel-2); border-color: transparent; }
  .badge.staleness::before {
    content: ""; display: inline-block;
    width: 7px; height: 7px; border-radius: 999px;
  }
  .badge.stale-fresh::before      { background: #10b981; }
  .badge.stale-stale::before      { background: #ef4444; }
  .badge.stale-very-stale::before { background: #1f2937; }
  @media (prefers-color-scheme: dark) {
    .badge.stale-very-stale::before { background: #f5f5f4; }
  }
  .badge.timing { border-color: transparent; font-weight: 500; }
  .badge.timing-today        { background: #fee2e2; color: #991b1b; }
  .badge.timing-tomorrow     { background: #fef3c7; color: #92400e; }
  .badge.timing-this-week    { background: #dbeafe; color: #1e3a8a; }
  .badge.timing-next-30-days { background: #f1f5f9; color: #475569; }
  @media (prefers-color-scheme: dark) {
    .badge.timing-today        { background: #7f1d1d; color: #fecaca; }
    .badge.timing-tomorrow     { background: #78350f; color: #fde68a; }
    .badge.timing-this-week    { background: #1e3a8a; color: #dbeafe; }
    .badge.timing-next-30-days { background: #292524; color: #e7e5e4; }
  }

  /* Toolbar (filter rows) */
  .toolbar {
    display: flex; align-items: center; flex-wrap: wrap;
    gap: 10px; padding: 8px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    font-size: 12px; color: var(--muted);
  }
  .filter-group { display: flex; gap: 6px; align-items: center; }
  .filter-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--muted); margin-right: 2px;
  }
  .filter-sep { color: var(--border); user-select: none; }
  .filter-group button {
    font: inherit; font-size: 12px; padding: 4px 10px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--panel);
    color: var(--muted); cursor: pointer;
  }
  .filter-group button:hover { color: var(--text); background: var(--panel-2); }
  .filter-group button[data-value="all"].active {
    background: var(--panel-2); color: var(--text); border-color: var(--border);
  }
  .filter-group[data-key="context"] button[data-value="Personal"].active {
    background: #dbeafe; color: #1e3a8a; border-color: transparent;
  }
  .filter-group[data-key="context"] button[data-value="Work"].active {
    background: #ede9fe; color: #5b21b6; border-color: transparent;
  }
  .filter-group[data-key="timing"] button[data-value="today"].active {
    background: #fee2e2; color: #991b1b; border-color: transparent;
  }
  .filter-group[data-key="timing"] button[data-value="tomorrow"].active {
    background: #fef3c7; color: #92400e; border-color: transparent;
  }
  .filter-group[data-key="timing"] button[data-value="this-week"].active {
    background: #dbeafe; color: #1e3a8a; border-color: transparent;
  }
  .filter-group[data-key="timing"] button[data-value="next-30-days"].active {
    background: #f1f5f9; color: #475569; border-color: transparent;
  }
  .filter-group[data-key="staleness"] button[data-value="fresh"].active {
    background: #d1fae5; color: #065f46; border-color: transparent;
  }
  .filter-group[data-key="staleness"] button[data-value="stale"].active {
    background: #fee2e2; color: #991b1b; border-color: transparent;
  }
  .filter-group[data-key="staleness"] button[data-value="very-stale"].active {
    background: #292524; color: #fafaf9; border-color: transparent;
  }
  .filter-group[data-key="groupBy"] button.active {
    background: var(--accent-soft); color: var(--accent); border-color: var(--accent);
    font-weight: 500;
  }
  @media (prefers-color-scheme: dark) {
    .filter-group[data-key="context"] button[data-value="Personal"].active { background: #1e3a8a; color: #dbeafe; }
    .filter-group[data-key="context"] button[data-value="Work"].active     { background: #4c1d95; color: #ede9fe; }
    .filter-group[data-key="timing"] button[data-value="today"].active        { background: #7f1d1d; color: #fecaca; }
    .filter-group[data-key="timing"] button[data-value="tomorrow"].active     { background: #78350f; color: #fde68a; }
    .filter-group[data-key="timing"] button[data-value="this-week"].active    { background: #1e3a8a; color: #dbeafe; }
    .filter-group[data-key="timing"] button[data-value="next-30-days"].active { background: #1c1917; color: #e7e5e4; }
    .filter-group[data-key="staleness"] button[data-value="fresh"].active     { background: #064e3b; color: #6ee7b7; }
    .filter-group[data-key="staleness"] button[data-value="stale"].active     { background: #7f1d1d; color: #fecaca; }
    .filter-group[data-key="staleness"] button[data-value="very-stale"].active { background: #fafaf9; color: #1c1917; }
  }

  /* Subtask progress chip on cards */
  .badge.subtasks-chip { font-weight: 500; }
  .badge.subtasks-chip.complete {
    background: #d1fae5; color: #065f46; border-color: transparent;
  }
  @media (prefers-color-scheme: dark) {
    .badge.subtasks-chip.complete { background: #064e3b; color: #6ee7b7; }
  }
  .card .del {
    position: absolute; top: 6px; right: 6px;
    border: none; background: transparent; color: var(--muted);
    font-size: 16px; line-height: 1; padding: 2px 6px; border-radius: 4px;
    opacity: 0; cursor: pointer;
  }
  .card:hover .del { opacity: 1; }
  .card .del:hover { color: var(--danger); background: var(--panel-2); }
  .add {
    border: 1px dashed var(--border);
    background: transparent; color: var(--muted);
    padding: 8px; margin: 8px 10px 10px; border-radius: 8px;
    text-align: left; font-size: 13px;
  }
  .add:hover { color: var(--text); border-color: var(--accent); }
  .col[data-status="in-progress"] .add:hover { color: #1e3a8a; border-color: #3b82f6; }
  .col[data-status="focus"]       .add:hover { color: #9d174d; border-color: #ec4899; }
  .col[data-status="done"]        .add:hover { color: #065f46; border-color: #10b981; }
  @media (prefers-color-scheme: dark) {
    .col[data-status="in-progress"] .add:hover { color: #93c5fd; }
    .col[data-status="focus"]       .add:hover { color: #fbcfe8; }
    .col[data-status="done"]        .add:hover { color: #6ee7b7; }
  }
  .new-input {
    margin: 8px 10px 10px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .new-input textarea {
    font: inherit; color: var(--text);
    background: var(--panel); border: 1px solid var(--accent);
    border-radius: 8px; padding: 8px 10px; resize: vertical; min-height: 60px;
    outline: none;
  }
  .new-input .row { display: flex; gap: 6px; justify-content: flex-end; }
  .empty {
    text-align: center; color: var(--muted); font-size: 12px;
    padding: 20px 8px; font-style: italic;
  }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* Auth overlay */
  .auth-overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 100;
  }
  .auth-overlay[hidden] { display: none; }
  .auth-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 32px; min-width: 340px; max-width: 420px;
  }
  .auth-card h2 {
    margin: 0 0 4px; font-size: 18px; font-weight: 600;
  }
  .auth-card p.subtitle {
    margin: 0 0 20px; color: var(--muted); font-size: 13px;
  }
  .auth-card input[type="email"],
  .auth-card input[type="password"] {
    width: 100%; font: inherit; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px; outline: none;
    margin-bottom: 10px;
  }
  .auth-card input[type="email"]:focus,
  .auth-card input[type="password"]:focus {
    border-color: var(--accent);
  }
  .auth-card button[type="submit"] {
    width: 100%; padding: 10px 12px;
    background: var(--accent); color: white;
    border-color: var(--accent); font-weight: 500;
  }
  .auth-card button[type="submit"]:hover {
    filter: brightness(1.1);
  }
  .auth-msg {
    margin-top: 12px; font-size: 12px; color: var(--muted); min-height: 1.4em;
  }
  .auth-msg.error { color: var(--danger); }
  .auth-msg.success { color: var(--accent); }

  /* Drawer */
  .drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.25);
    z-index: 50;
    opacity: 0; pointer-events: none;
    transition: opacity 0.15s ease;
  }
  .drawer-backdrop[data-open="true"] { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 520px; max-width: 92vw;
    background: var(--panel); border-left: 1px solid var(--border);
    box-shadow: -4px 0 16px rgba(0,0,0,0.08);
    z-index: 51;
    transform: translateX(100%);
    transition: transform 0.2s ease;
    display: flex; flex-direction: column;
  }
  .drawer-backdrop[data-open="true"] .drawer { transform: translateX(0); }
  .drawer-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  .drawer-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .drawer .field { margin-bottom: 16px; }
  .drawer .field-row { display: grid; grid-template-columns: 110px 1fr; gap: 12px; align-items: center; margin-bottom: 10px; }
  .drawer .field-row label { font-size: 12px; color: var(--muted); }
  .drawer input[type="text"], .drawer select, .drawer textarea {
    width: 100%; font: inherit; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 9px; outline: none;
  }
  .drawer input[type="text"]:focus,
  .drawer select:focus,
  .drawer textarea:focus { border-color: var(--accent); }
  .drawer textarea { min-height: 100px; resize: none; font-family: inherit; line-height: 1.5; overflow: hidden; }
  .drawer .title-input {
    font-size: 20px; font-weight: 600;
    border: none; background: transparent; padding: 0;
    color: var(--text);
  }
  .drawer .section-label {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; color: var(--muted); margin: 18px 0 6px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .drawer .section-label .progress { text-transform: none; letter-spacing: 0; }

  /* Subtasks */
  .subtasks-list { display: flex; flex-direction: column; gap: 4px; }
  .subtask-row {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 6px; border-radius: 6px;
  }
  .subtask-row:hover { background: var(--panel-2); }
  .subtask-row input[type="checkbox"] {
    width: 16px; height: 16px; cursor: pointer; flex: 0 0 auto;
    accent-color: var(--accent);
  }
  .subtask-row input[type="text"] {
    flex: 1; font: inherit; color: var(--text);
    background: transparent; border: none; padding: 4px 2px;
    outline: none; border-bottom: 1px solid transparent;
  }
  .subtask-row input[type="text"]:focus { border-bottom-color: var(--accent); }
  .subtask-row.done input[type="text"] {
    text-decoration: line-through; color: var(--muted);
  }
  .subtask-row .del {
    border: none; background: transparent; color: var(--muted);
    font-size: 16px; line-height: 1; padding: 2px 6px; border-radius: 4px;
    cursor: pointer; opacity: 0;
  }
  .subtask-row:hover .del { opacity: 1; }
  .subtask-row .del:hover { color: var(--danger); background: var(--panel-2); }
  .subtask-add {
    margin-top: 4px;
    border: 1px dashed var(--border);
    background: transparent; color: var(--muted);
    padding: 6px 10px; border-radius: 6px;
    text-align: left; font-size: 12px; cursor: pointer;
  }
  .subtask-add:hover { color: var(--text); border-color: var(--accent); }

  /* Markdown description */
  .desc-container { position: relative; }
  .desc-rendered {
    font-size: 13px; line-height: 1.55; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 9px 11px;
    min-height: 120px; cursor: text;
    white-space: normal;
  }
  .desc-rendered:hover { background: var(--bg); }
  .desc-rendered.empty { color: var(--muted); font-style: italic; }
  .desc-rendered h1, .desc-rendered h2, .desc-rendered h3 {
    margin: 0.7em 0 0.3em; font-weight: 600; line-height: 1.3;
  }
  .desc-rendered h1 { font-size: 16px; }
  .desc-rendered h2 { font-size: 15px; }
  .desc-rendered h3 { font-size: 14px; }
  .desc-rendered p { margin: 0.4em 0; }
  .desc-rendered ul, .desc-rendered ol { padding-left: 1.4em; margin: 0.4em 0; }
  .desc-rendered li { margin: 0.15em 0; }
  .desc-rendered a { color: var(--accent); text-decoration: underline; }
  .desc-rendered code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--panel); padding: 1px 5px; border-radius: 3px;
    font-size: 0.9em;
  }
  .desc-rendered pre {
    background: var(--panel); padding: 10px 12px; border-radius: 6px;
    overflow-x: auto; font-size: 12px;
  }
  .desc-rendered pre code { background: transparent; padding: 0; }
  .desc-rendered blockquote {
    border-left: 3px solid var(--border); margin: 0.4em 0;
    padding: 0.2em 0.8em; color: var(--muted);
  }
  .desc-rendered ul.contains-task-list { padding-left: 1.2em; list-style: none; }
  .desc-rendered .task-list-item { display: flex; align-items: baseline; gap: 6px; }
  .desc-rendered .task-list-item input[type="checkbox"] { margin: 0; }
</style>
</head>
<body>
  <header hidden>
    <h1>Kanban</h1>
    <div class="actions">
      <span class="ghost" id="status" style="font-size:12px;padding:6px 10px;color:var(--muted)"></span>
      <button class="ghost" id="clear-done" title="Remove all completed tasks">Clear done</button>
      <button class="ghost" id="sign-out" title="Sign out">Sign out</button>
    </div>
  </header>
  <div class="toolbar" id="toolbar" hidden>
    <div class="filter-group" data-key="groupBy">
      <span class="filter-label">Group</span>
      <button data-value="status" class="active">Status</button>
      <button data-value="timing">Due</button>
      <button data-value="staleness">Age</button>
      <button data-value="context">Context</button>
    </div>
    <span class="filter-sep">|</span>
    <div class="filter-group" data-key="context">
      <span class="filter-label">Context</span>
      <button data-value="all" class="active">All</button>
      <button data-value="Personal">Personal</button>
      <button data-value="Work">Work</button>
    </div>
    <span class="filter-sep">|</span>
    <div class="filter-group" data-key="timing">
      <span class="filter-label">Due</span>
      <button data-value="all" class="active">All</button>
      <button data-value="today">Today</button>
      <button data-value="tomorrow">Tomorrow</button>
      <button data-value="this-week">This Week</button>
      <button data-value="next-30-days">Next 30d</button>
    </div>
    <span class="filter-sep">|</span>
    <div class="filter-group" data-key="staleness">
      <span class="filter-label">Age</span>
      <button data-value="all" class="active">All</button>
      <button data-value="fresh">Fresh</button>
      <button data-value="stale">Stale</button>
      <button data-value="very-stale">Very Stale</button>
    </div>
  </div>
  <main id="board" hidden></main>

  <div id="auth" class="auth-overlay">
    <div class="auth-card">
      <h2>Kanban</h2>
      <p class="subtitle">Sign in</p>
      <form id="auth-form">
        <input type="email" placeholder="you@example.com" required autocomplete="email" />
        <input type="password" placeholder="password" required autocomplete="current-password" />
        <button type="submit">Sign in</button>
      </form>
      <p class="auth-msg" id="auth-msg"></p>
    </div>
  </div>

  <div class="drawer-backdrop" id="drawer-backdrop">
    <aside class="drawer" id="drawer" aria-hidden="true">
      <div class="drawer-head">
        <input type="text" class="title-input" id="drawer-title" placeholder="Title" />
        <button class="ghost" id="drawer-close" title="Close (Esc)">✕</button>
      </div>
      <div class="drawer-body">
        <div class="field-row">
          <label for="drawer-status">Status</label>
          <select id="drawer-status">
            <option value="inbox">Inbox</option>
            <option value="not-started">Not started</option>
            <option value="in-progress">In Progress</option>
            <option value="focus">Focus</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="field-row">
          <label for="drawer-context">Context</label>
          <select id="drawer-context">
            <option value="">—</option>
            <option value="Personal">Personal</option>
            <option value="Work">Work</option>
          </select>
        </div>
        <div class="field-row">
          <label for="drawer-timing">Due</label>
          <select id="drawer-timing">
            <option value="">—</option>
            <option value="today">Today</option>
            <option value="tomorrow">Tomorrow</option>
            <option value="this-week">This Week</option>
            <option value="next-30-days">Next 30 days</option>
          </select>
        </div>
        <div class="field-row">
          <label for="drawer-effort">Effort</label>
          <select id="drawer-effort">
            <option value="">—</option>
            <option value="S">S — quick (&lt;30 min)</option>
            <option value="M">M — focused (30 min–2 hr)</option>
            <option value="L">L — deep (½ day)</option>
            <option value="XL">XL — multi-day</option>
          </select>
        </div>
        <div class="field-row">
          <label for="drawer-source-link">Source link</label>
          <input type="text" id="drawer-source-link" placeholder="https://…" />
        </div>
        <div class="section-label">
          <span>Subtasks <span class="progress" id="subtasks-progress"></span></span>
        </div>
        <div class="subtasks-list" id="subtasks-list"></div>
        <button class="subtask-add" id="subtask-add">+ Add subtask</button>
        <div class="section-label"><span>Description</span></div>
        <div class="desc-container">
          <div class="desc-rendered" id="drawer-description-view" tabindex="0"></div>
          <textarea id="drawer-description" placeholder="Markdown: **bold**, _italic_, [link](url), - list, ## heading" hidden></textarea>
        </div>
      </div>
    </aside>
  </div>

<script>
(() => {
  const SUPABASE_URL = "https://icxwnryqyffvmxscwfcv.supabase.co";
  const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_kw2DYRs7qCPz74v-tzR12w_TDreloum";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
  });

  const FOCUS_CAP = 5;
  const TIMING_LABEL = {
    "today": "Today",
    "tomorrow": "Tomorrow",
    "this-week": "This Week",
    "next-30-days": "Next 30d",
  };

  const GROUP_BY = {
    status: {
      columns: [
        { id: "inbox",       label: "Inbox" },
        { id: "not-started", label: "Not started" },
        { id: "in-progress", label: "In Progress" },
        { id: "focus",       label: "Focus" },
        { id: "done",        label: "Done" },
      ],
      field: "status",
      extract: t => t.status,
      droppable: true,
    },
    timing: {
      columns: [
        { id: "today",        label: "Today" },
        { id: "tomorrow",     label: "Tomorrow" },
        { id: "this-week",    label: "This Week" },
        { id: "next-30-days", label: "Next 30 days" },
        { id: "__none__",     label: "—" },
      ],
      field: "timing",
      extract: t => t.timing || "__none__",
      droppable: true,
    },
    staleness: {
      columns: [
        { id: "fresh",      label: "Fresh" },
        { id: "stale",      label: "Stale" },
        { id: "very-stale", label: "Very Stale" },
      ],
      field: null,
      extract: t => t.staleness?.level || null,
      droppable: false,
    },
    context: {
      columns: [
        { id: "Personal", label: "Personal" },
        { id: "Work",     label: "Work" },
        { id: "__none__", label: "—" },
      ],
      field: "context",
      extract: t => t.context || "__none__",
      droppable: true,
    },
  };

  const now = () => new Date().toISOString();
  const statusEl = document.getElementById("status");
  const setStatus = (msg) => { statusEl.textContent = msg || ""; };

  let currentUser = null;
  let focusedTaskId = null;
  let state = {
    tasks: [],
    filter: { context: "all", timing: "all", staleness: "all" },
    groupBy: "status",
  };

  // === Auth ===
  function showAuth() {
    document.getElementById('auth').hidden = false;
    document.querySelector('header').hidden = true;
    document.getElementById('toolbar').hidden = true;
    document.getElementById('board').hidden = true;
  }
  function showApp() {
    document.getElementById('auth').hidden = true;
    document.querySelector('header').hidden = false;
    document.getElementById('toolbar').hidden = false;
    document.getElementById('board').hidden = false;
  }

  async function initAuth() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      currentUser = session.user;
      showApp();
      loadTasks();
    } else {
      showAuth();
    }
    supabase.auth.onAuthStateChange((event, session) => {
      if ((event === 'SIGNED_IN' || event === 'INITIAL_SESSION') && session) {
        if (currentUser?.id !== session.user.id) {
          currentUser = session.user;
          showApp();
          loadTasks();
        }
      } else if (event === 'SIGNED_OUT') {
        currentUser = null;
        state = { tasks: [] };
        showAuth();
      }
    });
  }

  document.getElementById('auth-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = e.target.querySelector('input[type="email"]').value.trim();
    const password = e.target.querySelector('input[type="password"]').value;
    const msg = document.getElementById('auth-msg');
    msg.className = 'auth-msg';
    msg.textContent = 'Signing in...';
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      msg.className = 'auth-msg error';
      msg.textContent = error.message;
    } else {
      msg.className = 'auth-msg success';
      msg.textContent = 'Signed in.';
    }
  });

  document.getElementById('sign-out').addEventListener('click', async () => {
    await supabase.auth.signOut();
  });

  // === Data transform ===
  function rowToTask(row) {
    return {
      id: row.id,
      title: row.title,
      description: row.description || "",
      status: row.status,
      context: row.context,
      source: row.source,
      sourceLink: row.source_link,
      timing: row.timing,
      effort: row.effort,
      subtasks: Array.isArray(row.subtasks) ? row.subtasks : [],
      staleness: computeStaleness(row.created_at),
      createdAt: row.created_at,
      updatedAt: row.updated_at,
    };
  }
  function patchToRow(patch) {
    const row = {};
    if ('title' in patch) row.title = patch.title;
    if ('description' in patch) row.description = patch.description;
    if ('status' in patch) row.status = patch.status;
    if ('context' in patch) row.context = patch.context;
    if ('source' in patch) row.source = patch.source;
    if ('sourceLink' in patch) row.source_link = patch.sourceLink;
    if ('timing' in patch) row.timing = patch.timing;
    if ('effort' in patch) row.effort = patch.effort;
    if ('subtasks' in patch) row.subtasks = patch.subtasks;
    return row;
  }
  function computeStaleness(iso) {
    if (!iso) return null;
    const days = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
    if (days < 7) return { label: "Fresh", level: "fresh" };
    if (days < 30) return { label: "Stale", level: "stale" };
    return { label: "Very Stale", level: "very-stale" };
  }

  // === Data layer ===
  async function loadTasks() {
    setStatus("Loading…");
    const { data, error } = await supabase
      .from('tasks')
      .select('*')
      .order('updated_at', { ascending: false });
    if (error) {
      setStatus("Load failed");
      alert("Could not load tasks: " + error.message);
      return;
    }
    state.tasks = data.map(rowToTask);
    setStatus("");
    render();
  }

  async function createTaskRow({ title, status, context, source }) {
    const { data, error } = await supabase
      .from('tasks')
      .insert({ title, status, context, source, user_id: currentUser.id })
      .select()
      .single();
    if (error) throw new Error(error.message);
    return rowToTask(data);
  }

  async function updateTaskRow(id, patch) {
    const { data, error } = await supabase
      .from('tasks')
      .update(patchToRow(patch))
      .eq('id', id)
      .select()
      .single();
    if (error) throw new Error(error.message);
    return rowToTask(data);
  }

  async function deleteTaskRow(id) {
    const { error } = await supabase.from('tasks').delete().eq('id', id);
    if (error) throw new Error(error.message);
  }

  // === View helpers ===
  function visibleTasks() {
    const { context, timing, staleness } = state.filter;
    return state.tasks.filter(t => {
      if (context !== "all" && t.context !== context) return false;
      if (timing !== "all" && t.timing !== timing) return false;
      if (staleness !== "all" && (t.staleness?.level || null) !== staleness) return false;
      return true;
    });
  }

  function currentGrouping() {
    return GROUP_BY[state.groupBy] || GROUP_BY.status;
  }

  function visibleTasksInOrder() {
    const grouping = currentGrouping();
    const tasks = visibleTasks();
    const result = [];
    for (const col of grouping.columns) {
      result.push(...tasks.filter(t => grouping.extract(t) === col.id));
    }
    return result;
  }

  function focusCard(id, { scroll = true } = {}) {
    focusedTaskId = id;
    document.querySelectorAll(".card.focused").forEach(c => c.classList.remove("focused"));
    if (!id) return;
    const el = document.querySelector(`.card[data-id="${CSS.escape(id)}"]`);
    if (el) {
      el.classList.add("focused");
      if (scroll) el.scrollIntoView({ block: "nearest", inline: "nearest", behavior: "smooth" });
    }
  }

  function moveFocus(delta) {
    const ordered = visibleTasksInOrder();
    if (!ordered.length) return;
    const idx = ordered.findIndex(t => t.id === focusedTaskId);
    const next = idx < 0 ? 0 : Math.max(0, Math.min(ordered.length - 1, idx + delta));
    focusCard(ordered[next].id);
  }

  // === Rendering ===
  const board = document.getElementById("board");

  function render() {
    board.innerHTML = "";
    const grouping = currentGrouping();
    const tasks0 = visibleTasks();
    if (focusedTaskId && !tasks0.some(t => t.id === focusedTaskId)) focusedTaskId = null;
    if (!focusedTaskId && tasks0.length) focusedTaskId = visibleTasksInOrder()[0]?.id || null;
    board.style.gridTemplateColumns = `repeat(${grouping.columns.length}, minmax(240px, 1fr))`;
    for (const col of grouping.columns) {
      const tasks = tasks0.filter(t => grouping.extract(t) === col.id);
      const colEl = document.createElement("section");
      colEl.className = "col";
      if (state.groupBy === "status") colEl.dataset.status = col.id;
      const isFocusCol = state.groupBy === "status" && col.id === "focus";
      const overCap = isFocusCol && tasks.length > FOCUS_CAP;
      if (overCap) colEl.classList.add("over-cap");
      const countLabel = isFocusCol ? `${tasks.length}/${FOCUS_CAP}` : `${tasks.length}`;
      const addBtn = state.groupBy === "status"
        ? `<button class="add" data-add="${col.id}">+ Add task</button>` : "";
      colEl.innerHTML = `
        <div class="col-head">
          <div class="col-title"><span class="dot"></span>${col.label}</div>
          <span class="count">${countLabel}</span>
        </div>
        <div class="cards"></div>
        ${addBtn}
      `;
      const cardsEl = colEl.querySelector(".cards");

      if (tasks.length === 0) {
        const e = document.createElement("div");
        e.className = "empty";
        e.textContent = "No tasks";
        cardsEl.appendChild(e);
      } else {
        for (const t of tasks) cardsEl.appendChild(renderCard(t));
      }

      if (grouping.droppable) {
        cardsEl.addEventListener("dragover", (e) => {
          e.preventDefault();
          cardsEl.classList.add("drag-over");
        });
        cardsEl.addEventListener("dragleave", () => cardsEl.classList.remove("drag-over"));
        cardsEl.addEventListener("drop", (e) => {
          e.preventDefault();
          cardsEl.classList.remove("drag-over");
          const id = e.dataTransfer.getData("text/plain");
          const task = state.tasks.find(t => t.id === id);
          if (!task) return;
          if (grouping.extract(task) === col.id) return;
          if (state.groupBy === "status" && col.id === "focus") {
            const focusCount = state.tasks.filter(t => t.status === "focus").length;
            if (focusCount >= FOCUS_CAP) {
              setStatus(`Focus cap (${FOCUS_CAP}) reached — drop one before adding`);
              setTimeout(() => setStatus(""), 3000);
              return;
            }
          }
          const value = col.id === "__none__" ? null : col.id;
          patchTask(task.id, { [grouping.field]: value });
        });
      }

      const addBtnEl = colEl.querySelector(".add");
      if (addBtnEl) addBtnEl.addEventListener("click", () => openNewInput(col.id, colEl));
      board.appendChild(colEl);
    }
    if (focusedTaskId) {
      const el = document.querySelector(`.card[data-id="${CSS.escape(focusedTaskId)}"]`);
      if (el) el.classList.add("focused");
    }
  }

  function renderCard(task) {
    const el = document.createElement("article");
    el.className = "card";
    el.draggable = true;
    el.dataset.id = task.id;
    const badges = [];
    if (task.context) {
      badges.push(`<span class="badge context-${task.context}">${task.context}</span>`);
    }
    if (task.source && task.source !== "Manual") {
      const link = task.sourceLink
        ? `<a href="${escapeHtml(task.sourceLink)}" target="_blank" rel="noopener" class="badge" title="Open source">${task.source}↗</a>`
        : `<span class="badge">${task.source}</span>`;
      badges.push(link);
    }
    if (task.staleness) {
      badges.push(`<span class="badge staleness stale-${task.staleness.level}">${escapeHtml(task.staleness.label)}</span>`);
    }
    if (task.timing) {
      const label = TIMING_LABEL[task.timing] || task.timing;
      badges.push(`<span class="badge timing timing-${task.timing}">${escapeHtml(label)}</span>`);
    }
    if (task.effort) {
      badges.push(`<span class="badge effort effort-${task.effort}">${escapeHtml(task.effort)}</span>`);
    }
    if (task.subtasks && task.subtasks.length) {
      const done = task.subtasks.filter(s => s.done).length;
      const total = task.subtasks.length;
      const complete = done === total ? "complete" : "";
      badges.push(`<span class="badge subtasks-chip ${complete}">✓ ${done}/${total}</span>`);
    }
    el.innerHTML = `
      <button class="del" title="Delete">×</button>
      <div class="title" tabindex="0">${escapeHtml(task.title)}</div>
      ${badges.length ? `<div class="badges">${badges.join("")}</div>` : ""}
      <div class="meta"><span>${formatDate(task.updatedAt)}</span></div>
    `;
    el.addEventListener("click", (e) => {
      if (e.target.closest(".del")) return;
      openDrawer(task.id);
    });

    el.querySelector(".del").addEventListener("click", (e) => {
      e.stopPropagation();
      deleteTask(task.id);
    });

    el.addEventListener("dragstart", (e) => {
      e.dataTransfer.setData("text/plain", task.id);
      e.dataTransfer.effectAllowed = "move";
      el.classList.add("dragging");
    });
    el.addEventListener("dragend", () => el.classList.remove("dragging"));
    el.addEventListener("mousedown", () => focusCard(task.id, { scroll: false }));
    return el;
  }

  // === Drawer ===
  let drawerTaskId = null;

  if (window.marked) window.marked.use({ gfm: true, breaks: true });
  function renderMarkdown(text) {
    if (!text || !text.trim()) return "";
    const raw = window.marked.parse(text);
    const clean = window.DOMPurify
      ? window.DOMPurify.sanitize(raw, { ADD_ATTR: ['target', 'rel'] })
      : raw;
    const div = document.createElement('div');
    div.innerHTML = clean;
    div.querySelectorAll('a').forEach(a => {
      a.setAttribute('target', '_blank');
      a.setAttribute('rel', 'noopener noreferrer');
    });
    return div.innerHTML;
  }

  function renderDescriptionView(text) {
    const view = document.getElementById('drawer-description-view');
    if (!text || !text.trim()) {
      view.classList.add('empty');
      view.textContent = "Notes, context, links… (markdown supported)";
    } else {
      view.classList.remove('empty');
      view.innerHTML = renderMarkdown(text);
    }
  }

  function autoResizeTextarea(el) {
    el.style.height = 'auto';
    el.style.height = Math.max(120, el.scrollHeight) + 'px';
  }

  function buildSubtaskRow(s, idx) {
    const row = document.createElement('div');
    row.className = 'subtask-row' + (s.done ? ' done' : '');
    row.dataset.idx = idx;
    row.innerHTML = `
      <input type="checkbox" ${s.done ? 'checked' : ''} />
      <input type="text" value="${escapeHtml(s.text)}" placeholder="Subtask…" />
      <button class="del" title="Remove">×</button>
    `;
    return row;
  }

  function renderSubtasks() {
    const task = state.tasks.find(t => t.id === drawerTaskId);
    if (!task) return;
    const list = document.getElementById('subtasks-list');
    list.innerHTML = "";
    (task.subtasks || []).forEach((s, i) => list.appendChild(buildSubtaskRow(s, i)));
    updateSubtasksProgress();
  }

  function updateSubtasksProgress() {
    const task = state.tasks.find(t => t.id === drawerTaskId);
    if (!task) return;
    const subtasks = task.subtasks || [];
    const el = document.getElementById('subtasks-progress');
    el.textContent = subtasks.length
      ? `${subtasks.filter(s => s.done).length}/${subtasks.length}`
      : "";
  }

  function openDrawer(taskId) {
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;
    drawerTaskId = taskId;
    document.getElementById('drawer-title').value = task.title || '';
    document.getElementById('drawer-status').value = task.status || 'inbox';
    document.getElementById('drawer-context').value = task.context || '';
    document.getElementById('drawer-timing').value = task.timing || '';
    document.getElementById('drawer-effort').value = task.effort || '';
    document.getElementById('drawer-source-link').value = task.sourceLink || '';

    const descTextarea = document.getElementById('drawer-description');
    const descView = document.getElementById('drawer-description-view');
    descTextarea.value = task.description || '';
    descTextarea.hidden = true;
    descView.hidden = false;
    renderDescriptionView(task.description || '');

    renderSubtasks();

    document.getElementById('drawer-backdrop').dataset.open = 'true';
    document.getElementById('drawer').setAttribute('aria-hidden', 'false');
    setTimeout(() => document.getElementById('drawer-title').focus(), 50);
  }

  function closeDrawer() {
    drawerTaskId = null;
    document.getElementById('drawer-backdrop').dataset.open = 'false';
    document.getElementById('drawer').setAttribute('aria-hidden', 'true');
  }

  function setupDrawer() {
    const fields = [
      ['drawer-title', 'title', 'blur'],
      ['drawer-status', 'status', 'change'],
      ['drawer-context', 'context', 'change'],
      ['drawer-timing', 'timing', 'change'],
      ['drawer-effort', 'effort', 'change'],
      ['drawer-source-link', 'sourceLink', 'blur'],
    ];
    for (const [elId, fieldKey, evt] of fields) {
      const el = document.getElementById(elId);
      el.addEventListener(evt, () => {
        if (!drawerTaskId) return;
        const task = state.tasks.find(t => t.id === drawerTaskId);
        if (!task) return;
        const raw = el.value;
        const next = raw === '' ? null : raw;
        const current = task[fieldKey] || null;
        if (next === current) return;
        patchTask(drawerTaskId, { [fieldKey]: next });
      });
    }

    // Description: view ↔ textarea toggle
    const descTextarea = document.getElementById('drawer-description');
    const descView = document.getElementById('drawer-description-view');
    descView.addEventListener('click', (e) => {
      if (e.target.closest('a')) return;
      if (!drawerTaskId) return;
      descView.hidden = true;
      descTextarea.hidden = false;
      autoResizeTextarea(descTextarea);
      descTextarea.focus();
      const len = descTextarea.value.length;
      descTextarea.setSelectionRange(len, len);
    });
    descTextarea.addEventListener('input', () => autoResizeTextarea(descTextarea));
    descTextarea.addEventListener('blur', () => {
      if (!drawerTaskId) return;
      const task = state.tasks.find(t => t.id === drawerTaskId);
      if (!task) return;
      const raw = descTextarea.value;
      const next = raw === '' ? null : raw;
      const current = task.description || null;
      if (next !== current) patchTask(drawerTaskId, { description: next });
      descTextarea.hidden = true;
      descView.hidden = false;
      renderDescriptionView(next || '');
    });

    // Subtasks
    const list = document.getElementById('subtasks-list');
    list.addEventListener('change', (e) => {
      if (!drawerTaskId) return;
      if (e.target.type !== 'checkbox') return;
      const row = e.target.closest('.subtask-row');
      const idx = parseInt(row.dataset.idx, 10);
      const task = state.tasks.find(t => t.id === drawerTaskId);
      if (!task) return;
      const done = e.target.checked;
      const next = task.subtasks.map((s, i) => i === idx ? { ...s, done } : s);
      patchTask(drawerTaskId, { subtasks: next });
      row.classList.toggle('done', done);
      updateSubtasksProgress();
    });
    list.addEventListener('focusout', (e) => {
      if (!drawerTaskId) return;
      const inp = e.target;
      if (inp.tagName !== 'INPUT' || inp.type !== 'text') return;
      const row = inp.closest('.subtask-row');
      const idx = parseInt(row.dataset.idx, 10);
      const task = state.tasks.find(t => t.id === drawerTaskId);
      if (!task) return;
      const text = inp.value.trim();
      const current = task.subtasks[idx]?.text || '';
      if (text === current) return;
      const next = task.subtasks.map((s, i) => i === idx ? { ...s, text } : s);
      patchTask(drawerTaskId, { subtasks: next });
    });
    list.addEventListener('keydown', (e) => {
      if (e.target.tagName !== 'INPUT' || e.target.type !== 'text') return;
      if (e.key === 'Enter') {
        e.preventDefault();
        e.target.blur();
        addSubtask();
      }
    });
    list.addEventListener('click', (e) => {
      if (!drawerTaskId) return;
      const del = e.target.closest('.del');
      if (!del) return;
      const row = del.closest('.subtask-row');
      const idx = parseInt(row.dataset.idx, 10);
      const task = state.tasks.find(t => t.id === drawerTaskId);
      if (!task) return;
      const next = task.subtasks.filter((_, i) => i !== idx);
      patchTask(drawerTaskId, { subtasks: next });
      renderSubtasks();
    });
    document.getElementById('subtask-add').addEventListener('click', addSubtask);

    document.getElementById('drawer-close').addEventListener('click', closeDrawer);
    document.getElementById('drawer-backdrop').addEventListener('click', (e) => {
      if (e.target.id === 'drawer-backdrop') closeDrawer();
    });
  }

  function addSubtask() {
    if (!drawerTaskId) return;
    const task = state.tasks.find(t => t.id === drawerTaskId);
    if (!task) return;
    const next = [...(task.subtasks || []), { text: '', done: false }];
    patchTask(drawerTaskId, { subtasks: next });
    renderSubtasks();
    const list = document.getElementById('subtasks-list');
    const lastRow = list.lastElementChild;
    if (lastRow) lastRow.querySelector('input[type="text"]').focus();
  }

  function openNewInput(status, colEl) {
    const existing = colEl.querySelector(".new-input");
    if (existing) { existing.querySelector("textarea").focus(); return; }

    const addBtn = colEl.querySelector(".add");
    const wrap = document.createElement("div");
    wrap.className = "new-input";
    wrap.innerHTML = `
      <textarea placeholder="Task title… (Enter to add, Esc to cancel)"></textarea>
      <div class="row">
        <button data-cancel>Cancel</button>
        <button data-add-confirm>Add</button>
      </div>
    `;
    addBtn.replaceWith(wrap);
    const ta = wrap.querySelector("textarea");
    ta.focus();

    const cancel = () => render();
    const confirm = async () => {
      const v = ta.value.trim();
      if (!v) return cancel();
      const ctx = state.filter.context === "Work" ? "Work" : "Personal";
      ta.disabled = true;
      try {
        const created = await createTaskRow({ title: v, status, context: ctx, source: "Manual" });
        state.tasks.unshift(created);
        render();
      } catch (e) {
        ta.disabled = false;
        alert("Could not add task: " + e.message);
      }
    };

    wrap.querySelector("[data-cancel]").addEventListener("click", cancel);
    wrap.querySelector("[data-add-confirm]").addEventListener("click", confirm);
    ta.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); confirm(); }
      if (e.key === "Escape") { e.preventDefault(); cancel(); }
    });
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }
  function formatDate(iso) {
    const d = new Date(iso);
    const today = new Date();
    const sameDay = d.toDateString() === today.toDateString();
    if (sameDay) return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    return d.toLocaleDateString([], { month: "short", day: "numeric" });
  }

  // === Mutations ===
  async function patchTask(id, patch) {
    const idx = state.tasks.findIndex(t => t.id === id);
    if (idx < 0) return;
    const before = state.tasks[idx];
    state.tasks[idx] = { ...before, ...patch, updatedAt: now() };
    render();
    try {
      const updated = await updateTaskRow(id, patch);
      state.tasks[idx] = updated;
      render();
    } catch (e) {
      state.tasks[idx] = before;
      render();
      alert("Update failed: " + e.message);
    }
  }

  async function deleteTask(id) {
    const idx = state.tasks.findIndex(t => t.id === id);
    if (idx < 0) return;
    const removed = state.tasks[idx];
    state.tasks.splice(idx, 1);
    render();
    try {
      await deleteTaskRow(id);
    } catch (e) {
      state.tasks.splice(idx, 0, removed);
      render();
      alert("Delete failed: " + e.message);
    }
  }

  // === Toolbar (group-by + filter pills) ===
  document.getElementById("toolbar").addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-value]");
    if (!btn) return;
    const group = btn.closest(".filter-group");
    if (!group) return;
    const key = group.dataset.key;
    if (key === "groupBy") {
      state.groupBy = btn.dataset.value;
    } else {
      state.filter[key] = btn.dataset.value;
    }
    group.querySelectorAll("button[data-value]").forEach(b => {
      b.classList.toggle("active", b === btn);
    });
    render();
  });

  // === Toolbar: clear done ===
  document.getElementById("clear-done").addEventListener("click", async () => {
    const done = state.tasks.filter(t => t.status === "done");
    if (done.length === 0) return;
    if (!confirm(`Remove ${done.length} completed task${done.length === 1 ? "" : "s"}?`)) return;
    setStatus(`Clearing ${done.length}…`);
    const results = await Promise.allSettled(done.map(t => deleteTaskRow(t.id)));
    const okIds = new Set(done.filter((_, i) => results[i].status === "fulfilled").map(t => t.id));
    state.tasks = state.tasks.filter(t => !okIds.has(t.id));
    setStatus("");
    render();
    const failed = results.filter(r => r.status === "rejected").length;
    if (failed) alert(`${failed} task(s) failed to delete`);
  });

  // === Keyboard ===
  function isTyping(el) {
    if (!el) return false;
    const tag = el.tagName;
    return tag === "INPUT" || tag === "TEXTAREA" || el.isContentEditable;
  }

  function getFocusedTask() {
    return state.tasks.find(t => t.id === focusedTaskId);
  }

  function moveFocusedToColumn(colId) {
    const task = getFocusedTask();
    if (!task) return;
    const grouping = currentGrouping();
    if (!grouping.droppable) return;
    if (grouping.extract(task) === colId) return;
    if (state.groupBy === "status" && colId === "focus") {
      const focusCount = state.tasks.filter(t => t.status === "focus").length;
      if (focusCount >= FOCUS_CAP) {
        setStatus(`Focus cap (${FOCUS_CAP}) reached — drop one before adding`);
        setTimeout(() => setStatus(""), 3000);
        return;
      }
    }
    const value = colId === "__none__" ? null : colId;
    patchTask(task.id, { [grouping.field]: value });
  }

  document.addEventListener("keydown", (e) => {
    if (isTyping(e.target)) return;
    if (!currentUser) return;

    if (e.key === "ArrowDown" || e.key === "j") { e.preventDefault(); moveFocus(1); return; }
    if (e.key === "ArrowUp"   || e.key === "k") { e.preventDefault(); moveFocus(-1); return; }

    if (e.key === "n" && state.groupBy === "status") {
      e.preventDefault();
      const focused = getFocusedTask();
      const targetCol = focused ? focused.status : "inbox";
      const colEl = board.querySelector(`.col[data-status="${targetCol}"]`);
      if (colEl) openNewInput(targetCol, colEl);
      return;
    }

    if (e.key === "Enter" || ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "e")) {
      const task = getFocusedTask();
      if (!task) return;
      e.preventDefault();
      openDrawer(task.id);
      return;
    }

    if (e.key === "Escape" && drawerTaskId) {
      e.preventDefault();
      closeDrawer();
      return;
    }

    if ((e.metaKey || e.ctrlKey) && e.key === "Backspace") {
      e.preventDefault();
      const task = getFocusedTask();
      if (!task) return;
      if (confirm(`Delete "${task.title}"?`)) deleteTask(task.id);
      return;
    }

    if (!e.metaKey && !e.ctrlKey && !e.altKey && /^[1-5]$/.test(e.key)) {
      const grouping = currentGrouping();
      const col = grouping.columns[parseInt(e.key, 10) - 1];
      if (!col || !grouping.droppable) return;
      e.preventDefault();
      moveFocusedToColumn(col.id);
      return;
    }
  });

  setupDrawer();
  initAuth();
})();
</script>
</body>
</html>
