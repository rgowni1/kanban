          if (effort !== null) patch.effort = effort;
          patchTask(draggedId, patch);
          return;
        }
        reorderFocus(draggedId, null, false, effort);
      });
    });

    const doneCol = root.querySelector('.focus-col-done');
    doneCol.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      doneCol.classList.add('drag-over');
    });
    doneCol.addEventListener('dragleave', (e) => {
      if (!doneCol.contains(e.relatedTarget)) doneCol.classList.remove('drag-over');
    });
    doneCol.addEventListener('drop', (e) => {
      e.preventDefault();
      doneCol.classList.remove('drag-over');
      const id = e.dataTransfer.getData('text/plain');
      if (!id) return;
      const task = state.tasks.find(t => t.id === id);
      if (!task || task.status === 'done') return;
      patchTask(id, { status: 'done' });
    });
  }

  function reorderFocus(draggedId, targetId, insertAbove, targetEffort) {
    const dragged = state.tasks.find(t => t.id === draggedId);
    if (!dragged) return;

    let arr = state.focusOrder.filter(x => x !== draggedId);
    if (targetId == null) {
      arr.push(draggedId);
    } else {
      const idx = arr.indexOf(targetId);
      if (idx === -1) arr.push(draggedId);
      else arr.splice(insertAbove ? idx : idx + 1, 0, draggedId);
    }
    state.focusOrder = arr;
    saveFocusOrder();

    const currentEffort = ['S','M','L','XL'].includes(dragged.effort) ? dragged.effort : null;
    if (targetEffort !== currentEffort) {
      patchTask(draggedId, { effort: targetEffort });
    } else {
      renderFocus();
    }
  }

  function renderCard(task) {
    const el = document.createElement("article");
    el.className = "card";
    if (state.filter.needsEffort) el.classList.add("needs-effort");
    el.draggable = true;
    el.dataset.id = task.id;
    const badges = [];
    if (task.context) {
      badges.push(`<span class="badge context-${task.context}">${task.context}</span>`);
    }
    if (task.source && task.source !== "Manual") {
      const link = task.sourceLink
        ? `<a href="${escapeHtml(task.sourceLink)}" target="_blank" rel="noopener" class="badge" title="Open source">${task.source}↗</a>`
        : `<span class="badge">${task.source}</span>`;
      badges.push(link);
    }
    if (task.staleness) {
      badges.push(`<span class="badge staleness stale-${task.staleness.level}">${escapeHtml(task.staleness.label)}</span>`);
    }
    if (task.timing) {
      const label = TIMING_LABEL[task.timing] || task.timing;
      badges.push(`<span class="badge timing timing-${task.timing}">${escapeHtml(label)}</span>`);
    }
    if (task.effort) {
      badges.push(`<span class="badge effort effort-${task.effort}">${escapeHtml(task.effort)}</span>`);
    }
    if (isProject(task)) {
      const { done, total } = projectProgress(task.id);
      const complete = done === total ? "complete" : "";
      badges.push(`<button class="badge project-chip ${complete}" data-open-project title="Open project">📁 ${done}/${total}</button>`);
    } else if (task.subtasks && task.subtasks.length) {
      const done = task.subtasks.filter(s => s.done).length;
      const total = task.subtasks.length;
      const complete = done === total ? "complete" : "";
      badges.push(`<span class="badge subtasks-chip ${complete}">✓ ${done}/${total}</span>`);
    }
    if (task.status === "done" && task.completedAt) {
      badges.push(`<span class="badge completed-chip" title="Completed ${escapeHtml(formatFullDate(task.completedAt))}">✓ Done ${escapeHtml(formatShortDate(task.completedAt))}</span>`);
    }
    el.innerHTML = `
      <button class="del" title="Delete">×</button>
      <div class="title" tabindex="0">${escapeHtml(task.title)}</div>
      ${badges.length ? `<div class="badges">${badges.join("")}</div>` : ""}
      <div class="meta"><span class="meta-created" title="Created ${escapeHtml(formatFullDate(task.createdAt))}">Created ${escapeHtml(formatShortDate(task.createdAt))}</span><span>${formatDate(task.updatedAt)}</span></div>
    `;
    el.addEventListener("click", (e) => {
      if (e.target.closest(".del")) return;
      if (e.target.closest("[data-open-project]")) {
        state.project = task.id;
        applyView();
        return;
      }
      openDrawer(task.id);
    });

    el.querySelector(".del").addEventListener("click", (e) => {
      e.stopPropagation();
      deleteTask(task.id);
    });

    el.addEventListener("dragstart", (e) => {
      e.dataTransfer.setData("text/plain", task.id);
      e.dataTransfer.effectAllowed = "move";
      el.classList.add("dragging");
    });
    el.addEventListener("dragend", () => el.classList.remove("dragging"));
    el.addEventListener("mousedown", () => focusCard(task.id, { scroll: false }));
    return el;
  }

  // === Drawer ===
  let drawerTaskId = null;

  if (window.marked) window.marked.use({ gfm: true, breaks: true });
  function renderMarkdown(text) {
    if (!text || !text.trim()) return "";
    const raw = window.marked.parse(text);
    const clean = window.DOMPurify
      ? window.DOMPurify.sanitize(raw, { ADD_ATTR: ['target', 'rel'] })
      : raw;
    const div = document.createElement('div');
    div.innerHTML = clean;
    div.querySelectorAll('a').forEach(a => {
      a.setAttribute('target', '_blank');
      a.setAttribute('rel', 'noopener noreferrer');
    });
    return div.innerHTML;
  }

  function renderDescriptionView(text) {
    const view = document.getElementById('drawer-description-view');
    if (!text || !text.trim()) {
      view.classList.add('empty');
      view.textContent = "Notes, context, links… (markdown supported)";
    } else {
      view.classList.remove('empty');
      view.innerHTML = renderMarkdown(text);
    }
  }

  function autoResizeTextarea(el) {
    el.style.height = 'auto';
    el.style.height = Math.max(120, el.scrollHeight) + 'px';
  }

  function buildSubtaskRow(child) {
    const row = document.createElement('div');
    row.className = 'subtask-row' + (child.status === 'done' ? ' done' : '');
    row.dataset.childId = child.id;
    row.innerHTML = `
      <input type="checkbox" ${child.status === 'done' ? 'checked' : ''} title="Mark done" />
      <input type="text" value="${escapeHtml(child.title)}" placeholder="Subtask…" />
      <button class="subtask-open" title="Open as its own task">↗</button>
      <button class="del" title="Remove">×</button>
    `;
    return row;
  }

  // Subtasks are now real child tasks (2-level project -> task hierarchy).
  function renderSubtasks() {
    const task = state.tasks.find(t => t.id === drawerTaskId);
    if (!task) return;
    const list = document.getElementById('subtasks-list');
    list.innerHTML = "";
    childrenOf(task.id)
      .slice()
      .sort((a, b) => (a.createdAt || '').localeCompare(b.createdAt || ''))
      .forEach(c => list.appendChild(buildSubtaskRow(c)));
    updateSubtasksProgress();
  }

  // Decide which hierarchy controls show for the drawer's task, and fill the project picker.
  function renderDrawerHierarchy() {
    const task = state.tasks.find(t => t.id === drawerTaskId);
    if (!task) return;
    const isChild = !!task.parentId;
    const hasKids = childrenOf(task.id).length > 0;
    // A project (has children) can't itself be nested; a child can't have its own subtasks.
    document.getElementById('drawer-parent-row').hidden = hasKids;
    document.getElementById('subtasks-section').hidden = isChild;
    const sel = document.getElementById('drawer-parent');
    const opts = ['<option value="">— No project</option>'];
    state.tasks
      .filter(t => !t.parentId && t.id !== task.id && !t.archived)
      .sort((a, b) => (a.title || '').localeCompare(b.title || ''))
      .forEach(t => opts.push(`<option value="${t.id}">${escapeHtml(t.title)}</option>`));
    sel.innerHTML = opts.join("");
    sel.value = task.parentId || "";
  }

  function renderTimestamps() {
    const task = state.tasks.find(t => t.id === drawerTaskId);
    const el = document.getElementById('drawer-timestamps');
    if (!task) { el.innerHTML = ""; return; }
    const rows = [];
    if (task.createdAt) {
      const age = task.staleness
        ? `<span class="ts-age stale-${task.staleness.level}">${escapeHtml(task.staleness.label)}</span>`
        : "";
      rows.push(`<div class="ts-row ts-created">
        <span class="ts-label">Created</span>
        <span class="ts-created-val">${escapeHtml(formatFullDate(task.createdAt))} ${age}</span>
        <button class="ts-reset" id="reset-staleness" title="Reset staleness — set Created to now">↻ Reset</button>
      </div>`);
    }
    if (task.completedAt) {
      rows.push(`<div class="ts-row"><span class="ts-label">Completed</span><span>${escapeHtml(formatFullDate(task.completedAt))}</span></div>`);
    }
    el.innerHTML = rows.join("");
    const resetBtn = document.getElementById('reset-staleness');
    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        patchTask(task.id, { createdAt: now() });
      });
    }
  }

  function updateSubtasksProgress() {
    const task = state.tasks.find(t => t.id === drawerTaskId);
    if (!task) return;
    const kids = childrenOf(task.id);
    const el = document.getElementById('subtasks-progress');
    el.textContent = kids.length
      ? `${kids.filter(c => c.status === 'done').length}/${kids.length}`
      : "";
  }

  function openDrawer(taskId) {
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;
    drawerTaskId = taskId;
    document.getElementById('drawer-title').value = task.title || '';
    document.getElementById('drawer-status').value = task.status || 'inbox';
    document.getElementById('drawer-context').value = task.context || '';
    document.getElementById('drawer-timing').value = task.timing || '';
    document.getElementById('drawer-effort').value = task.effort || '';
    document.getElementById('drawer-source-link').value = task.sourceLink || '';

    const descTextarea = document.getElementById('drawer-description');
    const descView = document.getElementById('drawer-description-view');
    descTextarea.value = task.description || '';
    descTextarea.hidden = true;
    descView.hidden = false;
    renderDescriptionView(task.description || '');

    renderDrawerHierarchy();
    renderSubtasks();
    renderTimestamps();

    document.getElementById('drawer-backdrop').dataset.open = 'true';
    document.getElementById('drawer').setAttribute('aria-hidden', 'false');
    setTimeout(() => document.getElementById('drawer-title').focus(), 50);
  }

  function closeDrawer() {
    drawerTaskId = null;
    document.getElementById('drawer-backdrop').dataset.open = 'false';
    document.getElementById('drawer').setAttribute('aria-hidden', 'true');
  }

  function setupDrawer() {
    const fields = [
      ['drawer-title', 'title', 'blur'],
      ['drawer-status', 'status', 'change'],
      ['drawer-context', 'context', 'change'],
      ['drawer-timing', 'timing', 'change'],
      ['drawer-effort', 'effort', 'change'],
      ['drawer-source-link', 'sourceLink', 'blur'],
    ];
    for (const [elId, fieldKey, evt] of fields) {
      const el = document.getElementById(elId);
      el.addEventListener(evt, () => {
        if (!drawerTaskId) return;
        const task = state.tasks.find(t => t.id === drawerTaskId);
        if (!task) return;
        const raw = el.value;
        const next = raw === '' ? null : raw;
        const current = task[fieldKey] || null;
        if (next === current) return;
        patchTask(drawerTaskId, { [fieldKey]: next });
      });
    }

    // Description: view ↔ textarea toggle
    const descTextarea = document.getElementById('drawer-description');
    const descView = document.getElementById('drawer-description-view');
    descView.addEventListener('click', (e) => {
      if (e.target.closest('a')) return;
      if (!drawerTaskId) return;
      descView.hidden = true;
      descTextarea.hidden = false;
      autoResizeTextarea(descTextarea);
      descTextarea.focus();
      const len = descTextarea.value.length;
      descTextarea.setSelectionRange(len, len);
    });
    descTextarea.addEventListener('input', () => autoResizeTextarea(descTextarea));
    descTextarea.addEventListener('blur', () => {
      if (!drawerTaskId) return;
      const task = state.tasks.find(t => t.id === drawerTaskId);
      if (!task) return;
      const raw = descTextarea.value;
      const next = raw === '' ? null : raw;
      const current = task.description || null;
      if (next !== current) patchTask(drawerTaskId, { description: next });
      descTextarea.hidden = true;
      descView.hidden = false;
      renderDescriptionView(next || '');
    });

    // Project (parent) picker
    document.getElementById('drawer-parent').addEventListener('change', (e) => {
      if (!drawerTaskId) return;
      const task = state.tasks.find(t => t.id === drawerTaskId);
      if (!task) return;
      const next = e.target.value || null;
      if (next === (task.parentId || null)) return;
      patchTask(drawerTaskId, { parentId: next });
      renderDrawerHierarchy();
    });

    // Subtasks (backed by real child tasks)
    const list = document.getElementById('subtasks-list');
    list.addEventListener('change', (e) => {
      if (!drawerTaskId) return;
      if (e.target.type !== 'checkbox') return;
      const row = e.target.closest('.subtask-row');
      const childId = row.dataset.childId;
      const done = e.target.checked;
      patchTask(childId, { status: done ? 'done' : 'not-started' });
      row.classList.toggle('done', done);
      updateSubtasksProgress();
    });
    list.addEventListener('focusout', (e) => {
      if (!drawerTaskId) return;
      const inp = e.target;
      if (inp.tagName !== 'INPUT' || inp.type !== 'text') return;
      const row = inp.closest('.subtask-row');
      const child = state.tasks.find(t => t.id === row.dataset.childId);
      if (!child) return;
      const title = inp.value.trim();
      if (title === (child.title || '')) return;
      patchTask(child.id, { title });
    });
    list.addEventListener('keydown', (e) => {
      if (e.target.tagName !== 'INPUT' || e.target.type !== 'text') return;
      if (e.key === 'Enter') {
        e.preventDefault();
        e.target.blur();
        addSubtask();
      }
    });
    list.addEventListener('click', (e) => {
      if (!drawerTaskId) return;
      const open = e.target.closest('.subtask-open');
      if (open) {
        const row = open.closest('.subtask-row');
        openDrawer(row.dataset.childId);   // drill into the child as its own task
        return;
      }
      const del = e.target.closest('.del');
      if (!del) return;
      const row = del.closest('.subtask-row');
      deleteTask(row.dataset.childId);
      renderDrawerHierarchy();
      renderSubtasks();
    });
    document.getElementById('subtask-add').addEventListener('click', addSubtask);

    document.getElementById('drawer-close').addEventListener('click', closeDrawer);
    document.getElementById('drawer-expand').addEventListener('click', toggleDrawerExpand);
    document.getElementById('drawer-backdrop').addEventListener('click', (e) => {
      if (e.target.id === 'drawer-backdrop') closeDrawer();
    });
  }

  function toggleDrawerExpand() {
    const drawer = document.getElementById('drawer');
    const expanded = drawer.classList.toggle('expanded');
    const btn = document.getElementById('drawer-expand');
    btn.textContent = expanded ? '⤡' : '⤢';
    btn.title = expanded ? 'Collapse (E)' : 'Expand — full-screen room for notes (E)';
    // If the description editor is open, re-fit it to the new height.
    const ta = document.getElementById('drawer-description');
    if (ta && !ta.hidden) autoResizeTextarea(ta);
  }

  async function addSubtask() {
    if (!drawerTaskId) return;
    const task = state.tasks.find(t => t.id === drawerTaskId);
    if (!task) return;
    if (task.parentId) return;   // a child task can't have its own subtasks (2-level only)
    const parentId = task.id;
    try {
      const created = await createTaskRow({
        title: '', status: 'not-started',
        context: task.context || 'Personal', source: 'Manual', parentId,
      });
      state.tasks.unshift(created);
      afterMutation();              // refresh board + sidebar progress
      if (drawerTaskId !== parentId) return;   // drawer moved on while awaiting
      renderDrawerHierarchy();      // standalone task just became a project
      renderSubtasks();
      const list = document.getElementById('subtasks-list');
      const row = list.querySelector(`.subtask-row[data-child-id="${CSS.escape(created.id)}"]`);
      if (row) row.querySelector('input[type="text"]').focus();
    } catch (e) {
      alert("Could not add subtask: " + e.message);
    }
  }

  function openNewInput(status, colEl) {
    const existing = colEl.querySelector(".new-input");
    if (existing) { existing.querySelector("textarea").focus(); return; }

    const addBtn = colEl.querySelector(".add");
    const wrap = document.createElement("div");
    wrap.className = "new-input";
    wrap.innerHTML = `
      <textarea placeholder="Task title… (Enter to add, Esc to cancel)"></textarea>
      <div class="row">
        <button data-cancel>Cancel</button>
        <button data-add-confirm>Add</button>
      </div>
    `;
    addBtn.replaceWith(wrap);
    const ta = wrap.querySelector("textarea");
    ta.focus();

    const cancel = () => render();
    const confirm = async () => {
      const v = ta.value.trim();
      if (!v) return cancel();
      const proj = state.project ? projectById(state.project) : null;
      const ctx = proj && proj.context
        ? proj.context
        : (state.filter.context === "Work" ? "Work" : "Personal");
      const timing = (state.filter.timing && state.filter.timing !== "all") ? state.filter.timing : undefined;
      const parentId = state.project || undefined;
      ta.disabled = true;
      try {
        const created = await createTaskRow({ title: v, status, context: ctx, source: "Manual", timing, parentId });
        state.tasks.unshift(created);
        render();
        recordUndo({
          label: `add "${truncate(created.title)}"`,
          undo: () => deleteTask(created.id),
          redo: () => restoreTask(created),
        });
      } catch (e) {
        ta.disabled = false;
        alert("Could not add task: " + e.message);
      }
    };

    wrap.querySelector("[data-cancel]").addEventListener("click", cancel);
    wrap.querySelector("[data-add-confirm]").addEventListener("click", confirm);
    ta.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); confirm(); }
      if (e.key === "Escape") { e.preventDefault(); cancel(); }
    });
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }
  function formatDate(iso) {
    const d = new Date(iso);
    const today = new Date();
    const sameDay = d.toDateString() === today.toDateString();
    if (sameDay) return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    return d.toLocaleDateString([], { month: "short", day: "numeric" });
  }
  function formatShortDate(iso) {
    return new Date(iso).toLocaleDateString([], { month: "short", day: "numeric" });
  }
  function formatFullDate(iso) {
    return new Date(iso).toLocaleString([], { month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit" });
  }

  // === Stats ===
  function startOfWeek(d) {
    // Monday-anchored week, local time
    const x = new Date(d);
    x.setHours(0, 0, 0, 0);
    const day = x.getDay(); // 0=Sun..6=Sat
    const diff = (day === 0 ? -6 : 1 - day); // back to Monday
    x.setDate(x.getDate() + diff);
    return x;
  }
  function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
  function formatWeekRange(weekStart) {
    const end = addDays(weekStart, 6);
    const sameMonth = weekStart.getMonth() === end.getMonth();
    const fmt = (d) => d.toLocaleDateString([], { month: "short", day: "numeric" });
    return sameMonth
      ? `${weekStart.toLocaleDateString([], { month: "short" })} ${weekStart.getDate()}–${end.getDate()}`
      : `${fmt(weekStart)} – ${fmt(end)}`;
  }
  function effortPoints(effort) { return POINTS[effort] || 0; }

  function workTasksCompletedInRange(start, end) {
    return state.tasks.filter(t => {
      if (t.context !== "Work") return false;
      if (!t.completedAt) return false;
      const c = new Date(t.completedAt);
      return c >= start && c < end;
    });
  }

  const WEEKDAY_LABELS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

  function weekdayAverages() {
    const currentStart = startOfWeek(new Date());
    const points = [0,0,0,0,0,0,0];
    const counts = [0,0,0,0,0,0,0];
    const N = HISTORY_WEEKS - 1; // exclude current (in-progress) week
    for (let i = 1; i <= N; i++) {
      const start = addDays(currentStart, -7 * i);
      const end   = addDays(start, 7);
      for (const t of workTasksCompletedInRange(start, end)) {
        const d = new Date(t.completedAt);
        const idx = (d.getDay() + 6) % 7; // Mon=0..Sun=6
        counts[idx] += 1;
        points[idx] += effortPoints(t.effort);
      }
    }
    return {
      pointsAvg: points.map(p => p / N),
      countAvg:  counts.map(c => c / N),
      weeksObserved: N,
    };
  }

  function summarize(tasks) {
    const byEffort = { S: 0, M: 0, L: 0, XL: 0, untagged: 0 };
    let points = 0;
    for (const t of tasks) {
      if (t.effort && byEffort.hasOwnProperty(t.effort)) {
        byEffort[t.effort]++;
        points += effortPoints(t.effort);
      } else {
        byEffort.untagged++;
      }
    }
    return { count: tasks.length, points, byEffort };
  }

  function untaggedWorkOpenCount() {
    return state.tasks.filter(t => t.context === "Work" && t.status !== "done" && !t.effort).length;
  }

  function renderStatsStrip() {
    const el = document.getElementById('stats-strip');
    if (!el || el.hidden) return;
    const ws = startOfWeek(new Date());
    const we = addDays(ws, 7);
    const tasks = workTasksCompletedInRange(ws, we);
    const s = summarize(tasks);
    const breakdownParts = ["S", "M", "L", "XL"]
      .filter(k => s.byEffort[k] > 0)
      .map(k => `<span>${k}:${s.byEffort[k]}</span>`);
    if (s.byEffort.untagged > 0) breakdownParts.push(`<span>?:${s.byEffort.untagged}</span>`);
    const untagged = untaggedWorkOpenCount();
    const isFilter = state.filter.needsEffort;
    const untaggedHtml = untagged > 0
      ? `<button class="untagged ${isFilter ? 'active' : ''}" id="untagged-pill">${isFilter ? `Showing ${untagged} untagged · clear` : `⚠ ${untagged} untagged`}</button>`
      : `<span class="untagged zero">All work tasks tagged ✓</span>`;
    el.innerHTML = `
      <span class="stat"><span>This week (Work):</span> <strong>${s.count}</strong> done</span>
      <span class="stat-sep">·</span>
      <span class="stat"><span class="points">${s.points}</span> pts</span>
      ${breakdownParts.length ? `<span class="stat-sep">·</span><span class="breakdown">${breakdownParts.join("")}</span>` : ""}
      ${untaggedHtml}
    `;
    const pill = document.getElementById('untagged-pill');
    if (pill) {
      pill.addEventListener('click', () => {
        state.filter.needsEffort = !state.filter.needsEffort;
        renderStatsStrip();
        render();
      });
    }
  }

  function renderStatsPage() {
    const el = document.getElementById('stats-page');
    const today = new Date();
    const currentStart = startOfWeek(today);
    const weeks = [];
    for (let i = 0; i < HISTORY_WEEKS; i++) {
      const start = addDays(currentStart, -7 * i);
      const end = addDays(start, 7);
      const tasks = workTasksCompletedInRange(start, end);
      weeks.push({ start, end, ...summarize(tasks) });
    }

    const current = weeks[0];
    const prior = weeks.slice(1).filter(w => w.count > 0);
    const avgPoints = prior.length ? (prior.reduce((a, w) => a + w.points, 0) / prior.length) : 0;
    const avgCount = prior.length ? (prior.reduce((a, w) => a + w.count, 0) / prior.length) : 0;
    const bestWeek = weeks.reduce((b, w) => w.points > b.points ? w : b, weeks[0]);

    const maxPoints = Math.max(1, ...weeks.map(w => w.points));
    const chartWeeks = [...weeks].reverse(); // oldest → newest
    const chartHtml = chartWeeks.map(w => {
      const h = (w.points / maxPoints) * 100;
      const isCurrent = w.start.getTime() === currentStart.getTime();
      const label = `${w.start.toLocaleDateString([], { month: "numeric", day: "numeric" })}`;
      return `
        <div class="bar-col" title="${formatWeekRange(w.start)} · ${w.count} done · ${w.points} pts">
          <div class="bar-value">${w.points || ""}</div>
          <div class="bar-wrap"><div class="bar ${isCurrent ? 'current' : ''}" style="height:${h}%"></div></div>
          <div class="x-label">${label}</div>
        </div>
      `;
    }).join("");

    const wd = weekdayAverages();
    const maxDayPoints = Math.max(0.001, ...wd.pointsAvg);
    const maxDayCount  = Math.max(0.001, ...wd.countAvg);
    const bestPointsDay = wd.pointsAvg.indexOf(Math.max(...wd.pointsAvg));
    const bestCountDay  = wd.countAvg.indexOf(Math.max(...wd.countAvg));
    const pointsByDayHtml = WEEKDAY_LABELS.map((label, i) => {
      const v = wd.pointsAvg[i];
      const h = (v / maxDayPoints) * 100;
      const isBest = i === bestPointsDay && v > 0;
      const display = v >= 10 ? v.toFixed(0) : v.toFixed(1);
      return `
        <div class="bar-col" title="${label} · avg ${display} pts">
          <div class="bar-value">${v > 0 ? display : ""}</div>
          <div class="bar-wrap"><div class="bar ${isBest ? 'current' : ''}" style="height:${h}%"></div></div>
          <div class="x-label">${label}</div>
        </div>
      `;
    }).join("");
    const countByDayHtml = WEEKDAY_LABELS.map((label, i) => {
      const v = wd.countAvg[i];
      const h = (v / maxDayCount) * 100;
      const isBest = i === bestCountDay && v > 0;
      const display = v >= 10 ? v.toFixed(0) : v.toFixed(1);
      return `
        <div class="bar-col" title="${label} · avg ${display} tasks">
          <div class="bar-value">${v > 0 ? display : ""}</div>
          <div class="bar-wrap"><div class="bar ${isBest ? 'current' : ''}" style="height:${h}%"></div></div>
          <div class="x-label">${label}</div>
        </div>
      `;
    }).join("");

    const rowsHtml = weeks.map(w => {
      const breakdown = ["S", "M", "L", "XL"]
        .filter(k => w.byEffort[k] > 0)
        .map(k => `${k}:${w.byEffort[k]}`).join(" · ");
      const untagged = w.byEffort.untagged > 0 ? ` <span style="color:#92400e">(?: ${w.byEffort.untagged})</span>` : "";
      const isCurrent = w.start.getTime() === currentStart.getTime();
      return `
        <tr class="${isCurrent ? 'current-week' : ''}">
          <td>${formatWeekRange(w.start)}${isCurrent ? " (this week)" : ""}</td>
          <td class="num">${w.count}</td>
          <td class="num"><span class="points">${w.points}</span></td>
          <td><span class="breakdown">${breakdown || "—"}${untagged}</span></td>
        </tr>
      `;
    }).join("");

    el.innerHTML = `
      <div class="stats-page-inner">
        <h2>Stats — Work</h2>
        <p class="subtitle">Throughput by completion date. 1pt = S, 2pt = M, 5pt = L, 10pt = XL.</p>

        <div class="summary-cards">
          <div class="summary-card">
            <div class="label">This week</div>
            <div class="value"><span class="points" style="color:var(--accent)">${current.points}</span> pts</div>
            <div class="sub">${current.count} task${current.count === 1 ? "" : "s"} done</div>
          </div>
          <div class="summary-card">
            <div class="label">${prior.length}-week average</div>
            <div class="value">${avgPoints.toFixed(1)} pts</div>
            <div class="sub">${avgCount.toFixed(1)} tasks / week</div>
          </div>
          <div class="summary-card">
            <div class="label">Best week (last ${HISTORY_WEEKS})</div>
            <div class="value">${bestWeek.points} pts</div>
            <div class="sub">${formatWeekRange(bestWeek.start)}</div>
          </div>
          <div class="summary-card">
            <div class="label">Untagged (open)</div>
            <div class="value" style="color:${untaggedWorkOpenCount() > 0 ? '#f59e0b' : 'inherit'}">${untaggedWorkOpenCount()}</div>
            <div class="sub">work tasks missing effort</div>
          </div>
        </div>

        <div class="stats-section">
          <h3>Points per week</h3>
          <div class="points-chart">${chartHtml}</div>
        </div>

        <div class="stats-section">
          <h3>By day of week <span class="section-sub">avg over last ${wd.weeksObserved} weeks (current week excluded)</span></h3>
          <div class="weekday-grid">
            <div>
              <div class="chart-label">Points / day</div>
              <div class="points-chart">${pointsByDayHtml}</div>
            </div>
            <div>
              <div class="chart-label">Tasks / day</div>
              <div class="points-chart">${countByDayHtml}</div>
            </div>
          </div>
        </div>

        <div class="stats-section">
          <h3>Weekly breakdown</h3>
          <table class="weeks-table">
            <thead><tr><th>Week</th><th class="num">Done</th><th class="num">Points</th><th>Breakdown</th></tr></thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
      </div>
    `;
  }

  // === Mutations ===
  // === Undo / Redo (session-only, in-memory) ===
  const undoMgr = { undo: [], redo: [], suspended: false, MAX: 60 };
  const truncate = (s, n = 28) => { s = (s || 'task').trim(); return s.length > n ? s.slice(0, n) + '…' : s; };
  function flashStatus(msg) { setStatus(msg); setTimeout(() => setStatus(""), 1800); }
  function undoLabelForPatch(patch) {
    const keys = Object.keys(patch);
    if (keys.includes('archived')) return patch.archived ? 'archive' : 'unarchive';
    if (keys.includes('status')) return 'move to ' + (patch.status || '—');
    if (keys.includes('createdAt')) return 'reset staleness';
    if (keys.includes('timing')) return 'change due';
    if (keys.includes('effort')) return 'change effort';
    if (keys.includes('subtasks')) return 'edit subtasks';
    if (keys.includes('title')) return 'edit title';
    if (keys.includes('description')) return 'edit notes';
    if (keys.includes('context')) return 'change context';
    return 'edit';
  }
  function recordUndo(entry) {
    if (undoMgr.suspended) return;
    undoMgr.undo.push(entry);
    if (undoMgr.undo.length > undoMgr.MAX) undoMgr.undo.shift();
    undoMgr.redo.length = 0;  // a fresh action invalidates the redo branch
  }
  async function performUndo() {
    const entry = undoMgr.undo.pop();
    if (!entry) { flashStatus("Nothing to undo"); return; }
    undoMgr.suspended = true;
    try { await entry.undo(); undoMgr.redo.push(entry); flashStatus("Undid: " + entry.label); }
    catch (e) { undoMgr.undo.push(entry); alert("Undo failed: " + e.message); }
    finally { undoMgr.suspended = false; }
  }
  async function performRedo() {
    const entry = undoMgr.redo.pop();
    if (!entry) { flashStatus("Nothing to redo"); return; }
    undoMgr.suspended = true;
    try { await entry.redo(); undoMgr.undo.push(entry); flashStatus("Redid: " + entry.label); }
    catch (e) { undoMgr.redo.push(entry); alert("Redo failed: " + e.message); }
    finally { undoMgr.suspended = false; }
  }

  async function patchTask(id, patch) {
    const idx = state.tasks.findIndex(t => t.id === id);
    if (idx < 0) return;
    const before = state.tasks[idx];
    if (patch.status === 'focus' && !('timing' in patch)) patch = { ...patch, timing: 'today' };
    if (!undoMgr.suspended) {
      const prev = {}, next = { ...patch };
      for (const k of Object.keys(patch)) prev[k] = before[k];
      recordUndo({
        label: undoLabelForPatch(patch),
        undo: () => patchTask(id, prev),
        redo: () => patchTask(id, next),
      });
    }
    const optimistic = { ...before, ...patch, updatedAt: now() };
    if ('createdAt' in patch) optimistic.staleness = computeStaleness(patch.createdAt);
    if ('status' in patch) {
      if (patch.status === 'done' && before.status !== 'done') optimistic.completedAt = now();
      else if (patch.status !== 'done' && before.status === 'done') optimistic.completedAt = null;
    }
    state.tasks[idx] = optimistic;
    afterMutation(id);
    try {
      const updated = await updateTaskRow(id, patch);
      state.tasks[idx] = updated;
      afterMutation(id);
    } catch (e) {
      state.tasks[idx] = before;
      afterMutation(id);
      alert("Update failed: " + e.message);
    }
  }

  function afterMutation(id) {
    if (state.filter.needsEffort && untaggedWorkOpenCount() === 0) {
      state.filter.needsEffort = false;
    }
    if (state.view === 'today') {
      renderToday();
    } else if (state.view === 'stats') {
      renderStatsPage();
    } else if (state.view === 'focus') {
      renderFocus();
    } else {
      render();
      renderStatsStrip();
    }
    updateFocusBtnCount();
    if (id && drawerTaskId === id) renderTimestamps();
  }

  async function deleteTask(id) {
    const idx = state.tasks.findIndex(t => t.id === id);
    if (idx < 0) return;
    const removed = state.tasks[idx];
    // Deleting a project cascades its children in the DB (ON DELETE CASCADE).
    const kids = childrenOf(id);
    if (kids.length && !confirm(`Delete "${removed.title}" and its ${kids.length} subtask(s)? This can't be undone.`)) return;
    // Mirror the cascade locally so state doesn't keep orphaned children.
    const removedKids = kids.slice();
    state.tasks = state.tasks.filter(t => t.id !== id && t.parentId !== id);
    if (state.project === id) state.project = null;   // were viewing this project
    if (drawerTaskId === id || removedKids.some(k => k.id === drawerTaskId)) closeDrawer();
    afterMutation();
    try {
      await deleteTaskRow(id);
      if (!kids.length) {
        recordUndo({
          label: `delete "${truncate(removed.title)}"`,
          undo: () => restoreTask(removed),
          redo: () => deleteTask(removed.id),
        });
      }
      // (project deletions aren't undoable — children are gone via cascade)
    } catch (e) {
      state.tasks.splice(idx, 0, removed, ...removedKids);
      afterMutation();
      alert("Delete failed: " + e.message);
    }
  }

  // === Toolbar (group-by + filter pills) ===
  document.getElementById("toolbar").addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-value]");
    if (!btn) return;
    const group = btn.closest(".filter-group");
    if (!group) return;
    const key = group.dataset.key;
    if (key === "groupBy") {
      state.groupBy = btn.dataset.value;
      group.querySelectorAll("button[data-value]").forEach(b => {
        b.classList.toggle("active", b === btn);
      });
    } else {
      const wasActive = btn.classList.contains("active");
      if (wasActive) {
        state.filter[key] = "all";
        btn.classList.remove("active");
      } else {
        state.filter[key] = btn.dataset.value;
        group.querySelectorAll("button[data-value]").forEach(b => {
          b.classList.toggle("active", b === btn);
        });
      }
    }
    render();
  });

  // === Toolbar: clear done ===
  document.getElementById("clear-done").addEventListener("click", async () => {
    const done = state.tasks.filter(t => t.status === "done" && !t.archived);
    if (done.length === 0) return;
    if (!confirm(`Archive ${done.length} completed task${done.length === 1 ? "" : "s"}? They leave the board but stay in your capacity stats.`)) return;
    setStatus(`Archiving ${done.length}…`);
    const results = await Promise.allSettled(done.map(t => updateTaskRow(t.id, { archived: true })));
    const succeeded = [];
    done.forEach((t, i) => {
      if (results[i].status === "fulfilled") {
        succeeded.push(t.id);
        const idx = state.tasks.findIndex(x => x.id === t.id);
        if (idx >= 0) state.tasks[idx] = results[i].value;
      }
    });
    setStatus("");
    afterMutation();
    if (succeeded.length) {
      const setArchived = async (val) => {
        for (const id of succeeded) {
          const r = await updateTaskRow(id, { archived: val });
          const i = state.tasks.findIndex(x => x.id === id);
          if (i >= 0) state.tasks[i] = r;
        }
        afterMutation();
      };
      recordUndo({
        label: `archive ${succeeded.length} done`,
        undo: () => setArchived(false),
        redo: () => setArchived(true),
      });
    }
    const failed = results.filter(r => r.status === "rejected").length;
    if (failed) alert(`${failed} task(s) failed to archive`);
  });

  document.getElementById("sidebar").addEventListener("click", (e) => {
    // Folder collapse caret — toggle open/closed without selecting.
    const caret = e.target.closest(".folder-caret");
    if (caret) {
      const key = caret.closest("[data-folder]").dataset.folder;
      projectFoldersCollapsed[key] = !projectFoldersCollapsed[key];
      saveFoldersCollapsed();
      renderSidebarProjects();
      return;
    }
    const btn = e.target.closest("button");
    if (!btn) return;

    // Context folder: scope the board to Work / Personal.
    if (btn.hasAttribute('data-folder')) {
      const key = btn.dataset.folder;
      if (key !== 'Work' && key !== 'Personal') {   // "No context" only toggles
        projectFoldersCollapsed[key] = !projectFoldersCollapsed[key];
        saveFoldersCollapsed();
        renderSidebarProjects();
        return;
      }
      state.filter.context = key;
      state.project = null;
      state.view = 'board';
      applyView();
      return;
    }

    // Project (data-project; "" = All Tasks). Drill into a project, syncing context.
    if (btn.hasAttribute('data-project')) {
      const pid = btn.dataset.project || null;
      state.project = pid;
      if (!pid) {
        state.filter.context = 'all';                 // All Tasks resets the filter
      } else {
        const p = projectById(pid);
        state.filter.context = (p && p.context) ? p.context : 'all';
      }
      state.view = 'board';
      applyView();
      return;
    }

    // Top-level nav (Today / Kanban / Stats).
    const target = btn.dataset.target;
    if (target === 'today') state.view = 'today';
    else if (target === 'kanban') state.view = (state.view === 'focus') ? 'focus' : 'board';
    else if (target === 'stats') state.view = 'stats';
    if (target) applyView();
  });

  document.getElementById("focus-btn").addEventListener("click", () => {
    state.view = (state.view === 'focus') ? 'board' : 'focus';
    applyView();
  });

  document.getElementById("header-ctx").addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-context]");
    if (!btn) return;
    const ctx = btn.dataset.context;
    state.filter.context = (state.filter.context === ctx) ? "all" : ctx;
    syncHeaderCtx();
    updateFocusBtnCount();
    renderSidebarProjects();
    if (state.view === 'today') renderToday();
    else if (state.view === 'stats') renderStatsPage();
    else if (state.view === 'focus') renderFocus();
    else { renderStatsStrip(); render(); }
  });

  function syncHeaderCtx() {
    document.querySelectorAll('#header-ctx .ctx-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.context === state.filter.context);
    });
  }

  // === Theme (Light / Dark / System) ===
  const THEME_KEY = 'kanban-theme';
  const THEME_ICON = { system: '🖥️', light: '☀️', dark: '🌙' };
  const THEME_ORDER = ['system', 'light', 'dark'];
  const themeMedia = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;
  function getThemePref() {
    const v = localStorage.getItem(THEME_KEY);
    return THEME_ORDER.includes(v) ? v : 'system';
  }
  function applyTheme() {
    const pref = getThemePref();
    const dark = pref === 'dark' || (pref === 'system' && themeMedia && themeMedia.matches);
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    const btn = document.getElementById('theme-toggle');
    if (btn) {
      btn.textContent = THEME_ICON[pref];
      btn.title = `Theme: ${pref[0].toUpperCase()}${pref.slice(1)}` +
        (pref === 'system' ? ` (${dark ? 'dark' : 'light'})` : '') + ' — click to change';
    }
  }
  function cycleTheme() {
    const next = THEME_ORDER[(THEME_ORDER.indexOf(getThemePref()) + 1) % THEME_ORDER.length];
    try { localStorage.setItem(THEME_KEY, next); } catch (e) {}
    applyTheme();
  }
  (function setupTheme() {
    const btn = document.getElementById('theme-toggle');
    if (btn) btn.addEventListener('click', cycleTheme);
    if (themeMedia) {
      const onChange = () => { if (getThemePref() === 'system') applyTheme(); };
      themeMedia.addEventListener ? themeMedia.addEventListener('change', onChange)
                                  : themeMedia.addListener(onChange);
    }
    applyTheme();
  })();

  // === Keyboard ===
  function isTyping(el) {
    if (!el) return false;
    const tag = el.tagName;
    return tag === "INPUT" || tag === "TEXTAREA" || el.isContentEditable;
  }

  function getFocusedTask() {
    return state.tasks.find(t => t.id === focusedTaskId);
  }

  function moveFocusedToColumn(colId) {
    const task = getFocusedTask();
    if (!task) return;
    const grouping = currentGrouping();
    if (!grouping.droppable) return;
    if (grouping.extract(task) === colId) return;
    if (state.groupBy === "status" && colId === "focus") {
      const ctx = task.context;
      if (focusCountFor(ctx) >= FOCUS_CAP) {
        setStatus(`${ctx || "Uncategorized"} Focus cap (${FOCUS_CAP}) reached — drop one before adding`);
        setTimeout(() => setStatus(""), 3000);
        return;
      }
    }
    const value = colId === "__none__" ? null : colId;
    patchTask(task.id, { [grouping.field]: value });
  }

  document.addEventListener("keydown", (e) => {
    if (isTyping(e.target)) return;
    if (!currentUser) return;

    const mod = e.metaKey || e.ctrlKey;
    if (mod && e.key.toLowerCase() === "z") {
      e.preventDefault();
      if (e.shiftKey) performRedo(); else performUndo();
      return;
    }
    if (mod && e.key.toLowerCase() === "y") { e.preventDefault(); performRedo(); return; }

    if (e.key === "ArrowDown" || e.key === "j") { e.preventDefault(); moveFocus(1); return; }
    if (e.key === "ArrowUp"   || e.key === "k") { e.preventDefault(); moveFocus(-1); return; }

    if (e.key === "n" && state.groupBy === "status") {
      e.preventDefault();
      const focused = getFocusedTask();
      const targetCol = focused ? focused.status : "inbox";
      const colEl = board.querySelector(`.col[data-status="${targetCol}"]`);
      if (colEl) openNewInput(targetCol, colEl);
      return;
    }

    if (e.key === "Enter" || ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "e")) {
      const task = getFocusedTask();
      if (!task) return;
      e.preventDefault();
      openDrawer(task.id);
      return;
    }

    if (e.key.toLowerCase() === "e" && !e.metaKey && !e.ctrlKey && drawerTaskId) {
      e.preventDefault();
      toggleDrawerExpand();
      return;
    }

    if (e.key === "Escape" && drawerTaskId) {
      e.preventDefault();
      closeDrawer();
      return;
    }

    if ((e.metaKey || e.ctrlKey) && e.key === "Backspace") {
      e.preventDefault();
      const task = getFocusedTask();
      if (!task) return;
      if (confirm(`Delete "${task.title}"?`)) deleteTask(task.id);
      return;
    }

    if (!e.metaKey && !e.ctrlKey && !e.altKey && /^[1-5]$/.test(e.key)) {
      const grouping = currentGrouping();
      const col = grouping.columns[parseInt(e.key, 10) - 1];
      if (!col || !grouping.droppable) return;
      e.preventDefault();
      moveFocusedToColumn(col.id);
      return;
    }
  });

  setupDrawer();
  setupToday();
  initAuth();
})();
</script>
</body>
</html>
