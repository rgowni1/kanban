<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kanban</title>
<script>
  // Resolve theme before first paint (no flash). 'system' follows the OS.
  (function () {
    try {
      var pref = localStorage.getItem('kanban-theme') || 'system';
      var dark = pref === 'dark' || (pref === 'system' &&
        window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    } catch (e) {}
  })();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf9f6;
    --panel: #ffffff;
    --panel-2: #f3f1ea;
    --border: #e2e0d6;
    --text: #1a2830;
    --muted: #64748b;
    --accent: #5d7050;        /* olive, slightly deeper than #A5B586 for contrast on text */
    --accent-soft: #ecefdb;
    --brand-navy: #1f3946;
    --brand-navy-soft: #2a4f62;
    --brand-olive: #a5b586;
    --danger: #b91c1c;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
    --radius: 10px;
    --serif: 'Playfair Display', Georgia, 'Times New Roman', serif;
    --sans: 'Noto Sans', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
  }
    :root[data-theme="dark"] {
      --bg: #0e1a22;
      --panel: #16242e;
      --panel-2: #1d2f3a;
      --border: #2e4756;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #a5b586;
      --accent-soft: #2f4234;
      --brand-navy: #16242e;
      --brand-navy-soft: #1d2f3a;
      --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.3);
    }
  * { box-sizing: border-box; }
  [hidden] { display: none !important; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font: 14px/1.45 var(--sans);
    background: var(--bg);
    color: var(--text);
    display: flex; flex-direction: row;
    overflow: hidden;
  }
  .app-main {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* Left sidebar */
  .sidebar {
    width: 220px; flex: 0 0 220px;
    background: var(--panel-2);
    border-right: 1px solid var(--border);
    padding: 18px 12px;
    display: flex; flex-direction: column;
    gap: 18px;
    overflow-y: auto;
  }
  .sidebar-brand {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 600;
    padding: 2px 8px 8px; color: var(--text);
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .sidebar-brand .brand-dot {
    width: 18px; height: 18px; border-radius: 6px;
    background: linear-gradient(135deg, var(--brand-navy), var(--brand-olive));
  }
  .sidebar-section { display: flex; flex-direction: column; gap: 2px; }
  .sidebar-section-title {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--muted);
    padding: 6px 10px 4px; font-weight: 600;
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: 7px;
    font-size: 13px; color: var(--text);
    cursor: pointer; border: none; background: transparent;
    text-align: left; width: 100%; font: inherit;
  }
  .sidebar-item:hover { background: var(--panel); }
  .sidebar-item.active {
    background: var(--accent-soft); color: var(--accent);
    font-weight: 500;
  }
  .sidebar-item .icon { font-size: 14px; opacity: 0.9; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 28px;
    background: var(--brand-navy);
    color: #fff;
    border-bottom: none;
  }
  header .title-group { display: flex; align-items: center; gap: 18px; }
  header .title-stack { display: flex; flex-direction: column; gap: 2px; }
  header .eyebrow {
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--brand-olive);
  }
  header h1 {
    margin: 0; font-family: var(--serif);
    font-size: 24px; font-weight: 600; letter-spacing: -0.005em;
    color: #fff;
  }
  header .actions { display: flex; gap: 8px; align-items: center; }
  header .actions .ghost {
    background: transparent; color: rgba(255,255,255,0.85);
    border: 1px solid rgba(255,255,255,0.18);
  }
  header .actions .ghost:hover {
    background: rgba(255,255,255,0.08); color: #fff;
  }

  /* Focus callout button */
  .focus-btn {
    background: linear-gradient(135deg, #ec4899, #f43f5e);
    color: #fff;
    border: none;
    padding: 7px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(236,72,153,0.25), 0 2px 8px rgba(236,72,153,0.18);
    transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .focus-btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
  .focus-btn:active { transform: translateY(0); }
  .focus-btn.active {
    background: linear-gradient(135deg, #be185d, #9f1239);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
  }
  .focus-btn .focus-count {
    background: rgba(255,255,255,0.25);
    padding: 1px 7px; border-radius: 999px;
    font-size: 11px; font-weight: 700;
  }

  /* Work / Personal context pills in the header */
  .ctx-group { display: inline-flex; gap: 8px; align-items: center; }
  .ctx-btn {
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.92);
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.12s ease, color 0.12s ease;
  }
  .ctx-btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.12); }
  .ctx-btn.active {
    color: #fff;
    border-color: transparent;
    box-shadow: 0 1px 2px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.12);
  }
  .ctx-work.active    { background: linear-gradient(135deg, #7c3aed, #5b21b6); }
  .ctx-personal.active { background: linear-gradient(135deg, #3b82f6, #1e3a8a); }
  button {
    font: inherit; color: var(--text); background: var(--panel);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; cursor: pointer;
  }
  button:hover { background: var(--panel-2); }
  button.ghost { border-color: transparent; background: transparent; color: var(--muted); }
  button.ghost:hover { color: var(--text); background: var(--panel-2); }
  main {
    display: grid;
    grid-template-columns: repeat(5, minmax(240px, 1fr));
    gap: 12px;
    padding: 16px 24px 24px;
    flex: 1; min-height: 0;
    overflow-x: auto;
  }
  .col {
    display: flex; flex-direction: column;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    min-height: 0;
  }
  .col-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .col-title {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 999px;
    font-weight: 500; font-size: 13px;
    background: var(--panel-2); color: var(--muted);
  }
  .dot { width: 7px; height: 7px; border-radius: 999px; background: var(--muted); }
  .col[data-status="inbox"]       .col-title { background: #f1f5f9; color: #475569; }
  .col[data-status="inbox"]       .dot { background: #94a3b8; }
  .col[data-status="not-started"] .col-title { background: #f1f5f9; color: #475569; }
  .col[data-status="not-started"] .dot { background: #94a3b8; }
  .col[data-status="in-progress"] .col-title { background: #dbeafe; color: #1e3a8a; }
  .col[data-status="in-progress"] .dot { background: #3b82f6; }
  .col[data-status="focus"]       .col-title { background: #fce7f3; color: #9d174d; }
  .col[data-status="focus"]       .dot { background: #ec4899; }
  .col[data-status="done"]        .col-title { background: #d1fae5; color: #065f46; }
  .col[data-status="done"]        .dot { background: #10b981; }
    [data-theme="dark"] .col[data-status="inbox"]       .col-title { background: #1e293b; color: #cbd5e1; }
  [data-theme="dark"] .col[data-status="not-started"] .col-title { background: #1e293b; color: #cbd5e1; }
  [data-theme="dark"] .col[data-status="in-progress"] .col-title { background: #1e3a8a40; color: #93c5fd; }
  [data-theme="dark"] .col[data-status="focus"]       .col-title { background: #831843; color: #fbcfe8; }
  [data-theme="dark"] .col[data-status="done"]        .col-title { background: #064e3b; color: #6ee7b7; }
  .col.over-cap .col-head { background: #fee2e2; }
    [data-theme="dark"] .col.over-cap .col-head { background: #450a0a; }
  .count { color: var(--muted); font-weight: 500; font-size: 12px; }
  .cards {
    flex: 1; overflow-y: auto; padding: 10px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .cards.drag-over { background: var(--accent-soft); }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    box-shadow: var(--shadow);
    cursor: grab;
    position: relative;
  }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: 0.4; }
  .card.focused {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  .card .title {
    outline: none; min-height: 1.4em; word-break: break-word;
  }
  .card .title[contenteditable="true"]:focus {
    background: var(--accent-soft); border-radius: 4px;
  }
  .card .meta {
    margin-top: 6px; font-size: 11px; color: var(--muted);
    display: flex; justify-content: space-between; align-items: center;
  }
  .card .meta .meta-created { font-weight: 600; color: var(--text); }
  .col[data-status="done"] .card .title { text-decoration: line-through; color: var(--muted); }
  .badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .badge {
    font-size: 11px; line-height: 1; padding: 4px 8px; border-radius: 999px;
    border: 1px solid var(--border); color: var(--muted); white-space: nowrap;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .badge.context-Personal { background: #dbeafe; color: #1e3a8a; border-color: transparent; }
  .badge.context-Work     { background: #ede9fe; color: #5b21b6; border-color: transparent; }
    [data-theme="dark"] .badge.context-Personal { background: #1e3a8a; color: #dbeafe; }
  [data-theme="dark"] .badge.context-Work { background: #4c1d95; color: #ede9fe; }
  .badge.effort { font-weight: 600; letter-spacing: 0.02em; border-color: transparent; }
  .badge.effort-S { background: #d1fae5; color: #065f46; }
  .badge.effort-M { background: #fef3c7; color: #92400e; }
  .badge.effort-L { background: #fee2e2; color: #991b1b; }
  .badge.effort-XL { background: #fce7f3; color: #9d174d; }
    [data-theme="dark"] .badge.effort-S { background: #064e3b; color: #6ee7b7; }
  [data-theme="dark"] .badge.effort-M { background: #78350f; color: #fde68a; }
  [data-theme="dark"] .badge.effort-L { background: #7f1d1d; color: #fecaca; }
  [data-theme="dark"] .badge.effort-XL { background: #831843; color: #fbcfe8; }
  .badge.staleness { background: var(--panel-2); border-color: transparent; }
  .badge.staleness::before {
    content: ""; display: inline-block;
    width: 7px; height: 7px; border-radius: 999px;
  }
  .badge.stale-fresh::before      { background: #10b981; }
  .badge.stale-stale::before      { background: #ef4444; }
  .badge.stale-very-stale::before { background: #1f2937; }
    [data-theme="dark"] .badge.stale-very-stale::before { background: #f5f5f4; }
  .badge.timing { border-color: transparent; font-weight: 500; }
  .badge.timing-today        { background: #fee2e2; color: #991b1b; }
  .badge.timing-tomorrow     { background: #fef3c7; color: #92400e; }
  .badge.timing-this-week    { background: #dbeafe; color: #1e3a8a; }
  .badge.timing-next-30-days { background: #f1f5f9; color: #475569; }
    [data-theme="dark"] .badge.timing-today { background: #7f1d1d; color: #fecaca; }
  [data-theme="dark"] .badge.timing-tomorrow { background: #78350f; color: #fde68a; }
  [data-theme="dark"] .badge.timing-this-week { background: #1e3a8a; color: #dbeafe; }
  [data-theme="dark"] .badge.timing-next-30-days { background: #292524; color: #e7e5e4; }

  /* Toolbar (filter rows) */
  .toolbar {
    display: flex; align-items: center; flex-wrap: wrap;
    gap: 18px; padding: 6px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    font-size: 11px; color: var(--muted);
  }
  .filter-group { display: flex; gap: 4px; align-items: center; }
  .filter-group button {
    font: inherit; font-size: 11px; padding: 3px 9px; border-radius: 999px;
    border: 1px solid transparent; background: transparent;
    color: var(--muted); cursor: pointer;
  }
  .filter-group button:hover { color: var(--text); background: var(--panel-2); }
  .filter-group.segmented {
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 999px; padding: 2px; gap: 0;
  }
  .filter-group.segmented button {
    padding: 3px 11px; color: var(--muted);
  }
  .filter-group.segmented button.active {
    background: var(--panel); color: var(--text); font-weight: 500;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .filter-group[data-key="context"] button[data-value="Personal"].active {
    background: #dbeafe; color: #1e3a8a; border-color: transparent;
  }
  .filter-group[data-key="context"] button[data-value="Work"].active {
    background: #ede9fe; color: #5b21b6; border-color: transparent;
  }
  .filter-group[data-key="timing"] button[data-value="today"].active {
    background: #fee2e2; color: #991b1b; border-color: transparent;
  }
  .filter-group[data-key="timing"] button[data-value="tomorrow"].active {
    background: #fef3c7; color: #92400e; border-color: transparent;
  }
  .filter-group[data-key="timing"] button[data-value="this-week"].active {
    background: #dbeafe; color: #1e3a8a; border-color: transparent;
  }
  .filter-group[data-key="timing"] button[data-value="next-30-days"].active {
    background: #f1f5f9; color: #475569; border-color: transparent;
  }
  .filter-group[data-key="staleness"] button[data-value="fresh"].active {
    background: #d1fae5; color: #065f46; border-color: transparent;
  }
  .filter-group[data-key="staleness"] button[data-value="stale"].active {
    background: #fee2e2; color: #991b1b; border-color: transparent;
  }
  .filter-group[data-key="staleness"] button[data-value="very-stale"].active {
    background: #292524; color: #fafaf9; border-color: transparent;
  }
  .filter-group[data-key="groupBy"] button.active {
    background: var(--accent-soft); color: var(--accent); border-color: var(--accent);
    font-weight: 500;
  }
    [data-theme="dark"] .filter-group[data-key="context"] button[data-value="Personal"].active { background: #1e3a8a; color: #dbeafe; }
  [data-theme="dark"] .filter-group[data-key="context"] button[data-value="Work"].active { background: #4c1d95; color: #ede9fe; }
  [data-theme="dark"] .filter-group[data-key="timing"] button[data-value="today"].active { background: #7f1d1d; color: #fecaca; }
  [data-theme="dark"] .filter-group[data-key="timing"] button[data-value="tomorrow"].active { background: #78350f; color: #fde68a; }
  [data-theme="dark"] .filter-group[data-key="timing"] button[data-value="this-week"].active { background: #1e3a8a; color: #dbeafe; }
  [data-theme="dark"] .filter-group[data-key="timing"] button[data-value="next-30-days"].active { background: #1c1917; color: #e7e5e4; }
  [data-theme="dark"] .filter-group[data-key="staleness"] button[data-value="fresh"].active { background: #064e3b; color: #6ee7b7; }
  [data-theme="dark"] .filter-group[data-key="staleness"] button[data-value="stale"].active { background: #7f1d1d; color: #fecaca; }
  [data-theme="dark"] .filter-group[data-key="staleness"] button[data-value="very-stale"].active { background: #fafaf9; color: #1c1917; }

  /* Subtask progress chip on cards */
  .badge.subtasks-chip { font-weight: 500; }
  .badge.subtasks-chip.complete {
    background: #d1fae5; color: #065f46; border-color: transparent;
  }
    [data-theme="dark"] .badge.subtasks-chip.complete { background: #064e3b; color: #6ee7b7; }
  .badge.completed-chip {
    background: #d1fae5; color: #065f46; border-color: transparent; font-weight: 500;
  }
    [data-theme="dark"] .badge.completed-chip { background: #064e3b; color: #6ee7b7; }
  .card .del {
    position: absolute; top: 6px; right: 6px;
    border: none; background: transparent; color: var(--muted);
    font-size: 16px; line-height: 1; padding: 2px 6px; border-radius: 4px;
    opacity: 0; cursor: pointer;
  }
  .card:hover .del { opacity: 1; }
  .card .del:hover { color: var(--danger); background: var(--panel-2); }
  .add {
    border: 1px dashed var(--border);
    background: transparent; color: var(--muted);
    padding: 8px; margin: 8px 10px 10px; border-radius: 8px;
    text-align: left; font-size: 13px;
  }
  .add:hover { color: var(--text); border-color: var(--accent); }
  .col[data-status="in-progress"] .add:hover { color: #1e3a8a; border-color: #3b82f6; }
  .col[data-status="focus"]       .add:hover { color: #9d174d; border-color: #ec4899; }
  .col[data-status="done"]        .add:hover { color: #065f46; border-color: #10b981; }
    [data-theme="dark"] .col[data-status="in-progress"] .add:hover { color: #93c5fd; }
  [data-theme="dark"] .col[data-status="focus"]       .add:hover { color: #fbcfe8; }
  [data-theme="dark"] .col[data-status="done"]        .add:hover { color: #6ee7b7; }
  .new-input {
    margin: 8px 10px 10px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .new-input textarea {
    font: inherit; color: var(--text);
    background: var(--panel); border: 1px solid var(--accent);
    border-radius: 8px; padding: 8px 10px; resize: vertical; min-height: 60px;
    outline: none;
  }
  .new-input .row { display: flex; gap: 6px; justify-content: flex-end; }
  .empty {
    text-align: center; color: var(--muted); font-size: 12px;
    padding: 20px 8px; font-style: italic;
  }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* Auth overlay */
  .auth-overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 100;
  }
  .auth-overlay[hidden] { display: none; }
  .auth-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 32px; min-width: 340px; max-width: 420px;
  }
  .auth-card h2 {
    margin: 0 0 4px; font-size: 18px; font-weight: 600;
  }
  .auth-card p.subtitle {
    margin: 0 0 20px; color: var(--muted); font-size: 13px;
  }
  .auth-card input[type="email"],
  .auth-card input[type="password"] {
    width: 100%; font: inherit; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px; outline: none;
    margin-bottom: 10px;
  }
  .auth-card input[type="email"]:focus,
  .auth-card input[type="password"]:focus {
    border-color: var(--accent);
  }
  .auth-card button[type="submit"] {
    width: 100%; padding: 10px 12px;
    background: var(--accent); color: white;
    border-color: var(--accent); font-weight: 500;
  }
  .auth-card button[type="submit"]:hover {
    filter: brightness(1.1);
  }
  .auth-msg {
    margin-top: 12px; font-size: 12px; color: var(--muted); min-height: 1.4em;
  }
  .auth-msg.error { color: var(--danger); }
  .auth-msg.success { color: var(--accent); }

  /* Drawer */
  .drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.25);
    z-index: 50;
    opacity: 0; pointer-events: none;
    transition: opacity 0.15s ease;
  }
  .drawer-backdrop[data-open="true"] { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 520px; max-width: 92vw;
    background: var(--panel); border-left: 1px solid var(--border);
    box-shadow: -4px 0 16px rgba(0,0,0,0.08);
    z-index: 51;
    transform: translateX(100%);
    transition: transform 0.2s ease;
    display: flex; flex-direction: column;
  }
  .drawer-backdrop[data-open="true"] .drawer:not(.expanded) { transform: translateX(0); }
  /* Expanded ("blown up") — large centered modal with room for long-form notes */
  .drawer.expanded {
    top: 4vh; bottom: 4vh; right: auto; left: 50%;
    width: min(1040px, 94vw); max-width: 94vw;
    transform: translateX(-50%);
    border: 1px solid var(--border); border-radius: 12px;
    box-shadow: 0 16px 56px rgba(0,0,0,0.30);
  }
  .drawer.expanded .drawer-body { padding: 24px 36px; }
  .drawer.expanded .desc-container { flex: 1; display: flex; flex-direction: column; }
  .drawer.expanded .desc-rendered,
  .drawer.expanded #drawer-description { min-height: 48vh; }
  .drawer.expanded #drawer-expand { background: var(--panel-2); }
  .drawer-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  .drawer-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .drawer .field { margin-bottom: 16px; }
  .drawer .field-row { display: grid; grid-template-columns: 110px 1fr; gap: 12px; align-items: center; margin-bottom: 10px; }
  .drawer .field-row label { font-size: 12px; color: var(--muted); }
  .drawer input[type="text"], .drawer select, .drawer textarea {
    width: 100%; font: inherit; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 9px; outline: none;
  }
  .drawer input[type="text"]:focus,
  .drawer select:focus,
  .drawer textarea:focus { border-color: var(--accent); }
  .drawer textarea { min-height: 100px; resize: none; font-family: inherit; line-height: 1.5; overflow: hidden; }
  .drawer .title-input {
    font-size: 20px; font-weight: 600;
    border: none; background: transparent; padding: 0;
    color: var(--text);
  }
  .drawer .section-label {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; color: var(--muted); margin: 18px 0 6px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .drawer .section-label .progress { text-transform: none; letter-spacing: 0; }

  /* Subtasks */
  .subtasks-list { display: flex; flex-direction: column; gap: 4px; }
  .subtask-row {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 6px; border-radius: 6px;
  }
  .subtask-row:hover { background: var(--panel-2); }
  .subtask-row input[type="checkbox"] {
    width: 16px; height: 16px; cursor: pointer; flex: 0 0 auto;
    accent-color: var(--accent);
  }
  .subtask-row input[type="text"] {
    flex: 1; font: inherit; color: var(--text);
    background: transparent; border: none; padding: 4px 2px;
    outline: none; border-bottom: 1px solid transparent;
  }
  .subtask-row input[type="text"]:focus { border-bottom-color: var(--accent); }
  .subtask-row.done input[type="text"] {
    text-decoration: line-through; color: var(--muted);
  }
  .subtask-row .del {
    border: none; background: transparent; color: var(--muted);
    font-size: 16px; line-height: 1; padding: 2px 6px; border-radius: 4px;
    cursor: pointer; opacity: 0;
  }
  .subtask-row:hover .del { opacity: 1; }
  .subtask-row .del:hover { color: var(--danger); background: var(--panel-2); }
  .subtask-add {
    margin-top: 4px;
    border: 1px dashed var(--border);
    background: transparent; color: var(--muted);
    padding: 6px 10px; border-radius: 6px;
    text-align: left; font-size: 12px; cursor: pointer;
  }
  .subtask-add:hover { color: var(--text); border-color: var(--accent); }
  .subtask-row .subtask-open {
    border: none; background: transparent; color: var(--muted);
    font-size: 13px; line-height: 1; padding: 2px 6px; border-radius: 4px;
    cursor: pointer; opacity: 0; flex: 0 0 auto;
  }
  .subtask-row:hover .subtask-open { opacity: 1; }
  .subtask-row .subtask-open:hover { color: var(--accent); background: var(--panel-2); }

  /* Projects: sidebar items */
  .sidebar-item.project-item { display: flex; align-items: center; gap: 6px; }
  .sidebar-item .project-name {
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .sidebar-item .project-progress {
    flex: 0 0 auto; font-size: 11px; color: var(--muted);
    background: var(--panel-2); border-radius: 999px; padding: 1px 7px;
  }
  .sidebar-item .project-progress.complete { color: #15803d; }
  [data-theme="dark"] .sidebar-item .project-progress.complete { color: #6ee7b7; }
  #project-list { display: flex; flex-direction: column; }
  .sidebar-item.folder-item { display: flex; align-items: center; gap: 6px; font-weight: 600; }
  .folder-caret {
    flex: 0 0 auto; width: 12px; font-size: 10px; color: var(--muted);
    display: inline-flex; justify-content: center; cursor: pointer;
  }
  .folder-children { display: flex; flex-direction: column; }
  .folder-children .project-child { padding-left: 26px; font-weight: 400; }
  .folder-empty { font-size: 11px; color: var(--muted); padding: 4px 10px 6px 30px; }

  /* Today view — clean daily sandbox */
  #today-view { padding: 8px 24px 32px; }
  .today-wrap { max-width: 920px; margin: 0 auto; }
  .today-head { display: flex; align-items: baseline; gap: 12px; margin: 8px 0 18px; }
  .today-title { font-size: 22px; font-weight: 700; margin: 0; }
  .today-date { color: var(--muted); font-size: 14px; }
  .today-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
  @media (max-width: 720px) { .today-grid { grid-template-columns: 1fr; } }
  .today-pane { display: flex; flex-direction: column; gap: 8px; }
  .today-pane-head {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; font-weight: 600; color: var(--muted);
    padding: 2px 4px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .today-pane-count { font-weight: 500; }
  .today-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
  .today-card {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; border-radius: 10px; cursor: pointer;
    background: var(--panel); border: 1px solid var(--border);
    transition: border-color 0.12s, transform 0.06s, background 0.12s;
  }
  .today-card:hover { border-color: var(--accent); }
  .today-card:active { transform: scale(0.995); }
  .today-card.focus { background: var(--panel-2); }
  .today-card-title { flex: 1; font-size: 14px; line-height: 1.35; overflow: hidden; text-overflow: ellipsis; }
  .today-bc { color: var(--muted); font-weight: 500; }
  .today-card.subtask { margin-left: 20px; background: transparent; }
  .today-card.subtask:hover { background: var(--panel); }
  .today-group {
    list-style: none; display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--muted); padding: 12px 6px 2px; cursor: pointer; border-radius: 6px;
  }
  .today-group:hover .today-group-name { color: var(--accent); }
  .today-group-count { margin-left: auto; font-weight: 500; }
  .today-group .today-del { font-size: 16px; margin-left: 4px; }
  .today-group:hover .today-del { opacity: 1; }
  .ctx-dot { flex: 0 0 auto; width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .ctx-dot-Work { background: #7c3aed; }
  .ctx-dot-Personal { background: #2563eb; }
  .ctx-ico { flex: 0 0 auto; font-size: 14px; line-height: 1; width: 18px; text-align: center; }
  .ctx-ico.ctx-none { color: var(--muted); }
  .today-due {
    flex: 0 0 auto; font-size: 11px; color: var(--muted);
    background: var(--panel-2); border-radius: 999px; padding: 1px 8px;
  }
  .today-due.now { color: #b91c1c; background: #fee2e2; }
  [data-theme="dark"] .today-due.now { color: #fecaca; background: #7f1d1d; }
  .today-edit {
    flex: 0 0 auto; border: none; background: transparent; color: var(--muted);
    font-size: 13px; padding: 2px 6px; border-radius: 6px; cursor: pointer; opacity: 0;
  }
  .today-card:hover .today-edit { opacity: 1; }
  .today-edit:hover { color: var(--accent); background: var(--panel-2); }
  .today-del {
    flex: 0 0 auto; border: none; background: transparent; color: var(--muted);
    font-size: 18px; line-height: 1; padding: 0 6px; border-radius: 6px; cursor: pointer; opacity: 0;
  }
  .today-card:hover .today-del { opacity: 1; }
  .today-del:hover { color: var(--danger); background: var(--panel-2); }
  .today-empty { color: var(--muted); font-size: 13px; padding: 14px 4px; }
  .today-add { margin-bottom: 2px; }
  .today-add input {
    width: 100%; font: inherit; font-size: 14px; color: var(--text);
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; outline: none;
  }
  .today-add input:focus { border-color: var(--accent); }

  /* Projects: breadcrumb bar above the board */
  .project-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px; margin: 0 0 4px;
    font-size: 13px; color: var(--text);
  }
  .project-bar .project-back {
    border: 1px solid var(--border); background: var(--panel);
    color: var(--text); padding: 4px 10px; border-radius: 6px; cursor: pointer;
    font-size: 12px;
  }
  .project-bar .project-back:hover { border-color: var(--accent); }
  .project-bar-sep { color: var(--muted); }
  .project-bar-title { font-weight: 600; }
  .project-bar-progress {
    margin-left: auto; font-size: 12px; color: var(--muted);
    background: var(--panel-2); border-radius: 999px; padding: 2px 10px;
  }
  .project-bar-progress.complete { color: #15803d; }
  [data-theme="dark"] .project-bar-progress.complete { color: #6ee7b7; }

  /* Projects: card chip (click to drill in) */
  .badge.project-chip {
    border: none; cursor: pointer; font: inherit; font-weight: 500;
    background: #ede9fe; color: #5b21b6;
  }
  .badge.project-chip.complete { background: #dcfce7; color: #15803d; }
  .badge.project-chip:hover { filter: brightness(0.95); }
  [data-theme="dark"] .badge.project-chip { background: #4c1d95; color: #ede9fe; }
  [data-theme="dark"] .badge.project-chip.complete { background: #064e3b; color: #6ee7b7; }

  /* Markdown description */
  .desc-container { position: relative; }
  .desc-rendered {
    font-size: 13px; line-height: 1.55; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 9px 11px;
    min-height: 120px; cursor: text;
    white-space: normal;
  }
  .desc-rendered:hover { background: var(--bg); }
  .desc-rendered.empty { color: var(--muted); font-style: italic; }
  .desc-rendered h1, .desc-rendered h2, .desc-rendered h3 {
    margin: 0.7em 0 0.3em; font-weight: 600; line-height: 1.3;
  }
  .desc-rendered h1 { font-size: 16px; }
  .desc-rendered h2 { font-size: 15px; }
  .desc-rendered h3 { font-size: 14px; }
  .desc-rendered p { margin: 0.4em 0; }
  .desc-rendered ul, .desc-rendered ol { padding-left: 1.4em; margin: 0.4em 0; }
  .desc-rendered li { margin: 0.15em 0; }
  .desc-rendered a { color: var(--accent); text-decoration: underline; }
  .desc-rendered code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--panel); padding: 1px 5px; border-radius: 3px;
    font-size: 0.9em;
  }
  .desc-rendered pre {
    background: var(--panel); padding: 10px 12px; border-radius: 6px;
    overflow-x: auto; font-size: 12px;
  }
  .desc-rendered pre code { background: transparent; padding: 0; }
  .desc-rendered blockquote {
    border-left: 3px solid var(--border); margin: 0.4em 0;
    padding: 0.2em 0.8em; color: var(--muted);
  }
  .desc-rendered ul.contains-task-list { padding-left: 1.2em; list-style: none; }
  .desc-rendered .task-list-item { display: flex; align-items: baseline; gap: 6px; }
  .desc-rendered .task-list-item input[type="checkbox"] { margin: 0; }
  .drawer-timestamps {
    margin-top: 24px; padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 12px; color: var(--muted);
    display: flex; flex-direction: column; gap: 4px;
  }
  .drawer-timestamps .ts-row { display: flex; gap: 8px; align-items: center; }
  .drawer-timestamps .ts-label { width: 80px; flex: 0 0 auto; }
  .drawer-timestamps .ts-created { font-size: 14px; color: var(--text); }
  .drawer-timestamps .ts-created .ts-label { font-weight: 600; }
  .drawer-timestamps .ts-created-val { flex: 1 1 auto; }
  .drawer-timestamps .ts-age {
    margin-left: 6px; padding: 1px 6px; border-radius: 999px;
    font-size: 11px; font-weight: 600; vertical-align: middle;
  }
  .drawer-timestamps .ts-age.stale-fresh { background: rgba(34,197,94,.15); color: #16a34a; }
  .drawer-timestamps .ts-age.stale-stale { background: rgba(234,179,8,.15); color: #ca8a04; }
  .drawer-timestamps .ts-age.stale-very-stale { background: rgba(239,68,68,.15); color: #dc2626; }
  .drawer-timestamps .ts-reset {
    flex: 0 0 auto; cursor: pointer; font-size: 11px;
    padding: 3px 8px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--panel-2); color: var(--text);
  }
  .drawer-timestamps .ts-reset:hover { border-color: var(--accent, #6366f1); }

  /* Focus view */
  #focus-view { padding: 28px 24px 80px; overflow-y: auto; flex: 1; }
  .focus-wrap { max-width: 1100px; margin: 0 auto; }
  .focus-grid {
    display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px;
  }
  @media (max-width: 760px) { .focus-grid { grid-template-columns: 1fr; } }
  .focus-col {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 16px 20px;
    min-height: 400px;
    display: flex; flex-direction: column;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .focus-col-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 14px; padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .focus-col-title { font-family: var(--serif); font-size: 19px; font-weight: 600; color: var(--text); letter-spacing: -0.005em; }
  .focus-col-count { font-size: 12px; color: var(--muted); }
  .focus-list {
    list-style: none; margin: 0; padding: 0;
    display: flex; flex-direction: column; gap: 8px;
    flex: 1;
  }
  .focus-sections { display: flex; flex-direction: column; gap: 12px; flex: 1; }
  .focus-section {
    padding: 6px 4px;
    border-radius: 8px;
    transition: background 0.12s ease;
  }
  .focus-section.drag-over-section { background: var(--accent-soft); }
  .focus-section-head {
    display: flex; align-items: baseline; gap: 8px;
    padding: 4px 6px 8px;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    font-weight: 600; color: var(--muted);
  }
  .focus-section-count {
    background: var(--panel-2); color: var(--muted);
    padding: 1px 7px; border-radius: 999px; font-size: 10px;
  }
  .focus-section-list { gap: 6px; }
  .focus-section-empty {
    list-style: none;
    color: var(--muted); font-size: 11px; font-style: italic;
    padding: 8px 12px;
    border: 1px dashed var(--border); border-radius: 8px;
    text-align: center;
  }
  .focus-card { position: relative; }
  .focus-card.drop-before::before,
  .focus-card.drop-after::after {
    content: ""; position: absolute; left: 0; right: 0;
    height: 2px; background: var(--accent); border-radius: 2px;
    pointer-events: none;
  }
  .focus-card.drop-before::before { top: -4px; }
  .focus-card.drop-after::after { bottom: -4px; }
  .focus-col-todo .focus-col-title::before { content: "🎯 "; }
  .focus-col-done {
    background: linear-gradient(180deg, #ecfdf5 0%, var(--panel) 60%);
    border-color: #a7f3d0;
  }
  .focus-col-done .focus-col-title { color: #065f46; }
  .focus-col-done .focus-col-title::before { content: "✓ "; color: #10b981; }
  .focus-col.drag-over {
    border-color: #10b981;
    background: #d1fae5;
  }
    [data-theme="dark"] .focus-col-done {
      background: linear-gradient(180deg, #064e3b40 0%, var(--panel) 60%);
      border-color: #065f46;
    }
  [data-theme="dark"] .focus-col-done .focus-col-title { color: #6ee7b7; }
  [data-theme="dark"] .focus-col.drag-over { background: #064e3b; }
  .focus-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    box-shadow: var(--shadow);
    cursor: grab;
    transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.18s ease;
  }
  .focus-card:hover { box-shadow: 0 2px 6px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05); }
  .focus-card:active { cursor: grabbing; }
  .focus-card.dragging { opacity: 0.4; }
  .focus-card-title {
    font-size: 14px; color: var(--text); line-height: 1.4;
    word-break: break-word;
  }
  .focus-card-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .focus-col-done .focus-card-title {
    text-decoration: line-through; color: var(--muted);
  }
  .focus-empty {
    text-align: center; color: var(--muted); font-size: 13px;
    padding: 30px 12px;
  }

  /* View toggle (header) */
  .view-toggle { display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .view-toggle button {
    border: none; background: var(--panel); color: var(--muted);
    padding: 5px 12px; font-size: 12px; border-radius: 0; cursor: pointer;
  }
  .view-toggle button.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
  .view-toggle button + button { border-left: 1px solid var(--border); }

  /* Stats strip (above board) */
  .stats-strip {
    display: flex; align-items: center; gap: 14px;
    padding: 8px 24px; font-size: 12px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    color: var(--muted);
  }
  .stats-strip .stat { display: inline-flex; align-items: center; gap: 6px; }
  .stats-strip .stat strong { color: var(--text); font-weight: 600; }
  .stats-strip .stat .points { color: var(--accent); font-weight: 600; }
  .stats-strip .stat-sep { color: var(--border); }
  .stats-strip .breakdown { color: var(--muted); }
  .stats-strip .breakdown span { margin-right: 8px; }
  .stats-strip .untagged {
    margin-left: auto;
    background: #fef3c7; color: #92400e;
    border: 1px solid transparent; border-radius: 999px;
    padding: 3px 10px; cursor: pointer; font-weight: 500;
  }
  .stats-strip .untagged:hover { filter: brightness(0.97); }
  .stats-strip .untagged.active { background: #f59e0b; color: #fff; }
  .stats-strip .untagged.zero { background: transparent; color: var(--muted); cursor: default; border-color: var(--border); }
    [data-theme="dark"] .stats-strip .untagged { background: #78350f; color: #fde68a; }
  [data-theme="dark"] .stats-strip .untagged.active { background: #f59e0b; color: #0c0a09; }

  /* Card highlight when needs-effort filter active */
  .card.needs-effort { border-color: #f59e0b; }
  .card.needs-effort::before {
    content: "?"; position: absolute; top: -6px; left: -6px;
    width: 16px; height: 16px; border-radius: 999px;
    background: #f59e0b; color: #fff;
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

  /* Stats page */
  #stats-page {
    flex: 1; min-height: 0; overflow-y: auto;
    padding: 24px 32px;
  }
  .stats-page-inner { max-width: 920px; margin: 0 auto; }
  .stats-page-inner h2 {
    margin: 0 0 4px; font-size: 22px; font-weight: 600;
    font-family: var(--serif); letter-spacing: -0.005em;
  }
  .stats-page-inner .subtitle {
    margin: 0 0 24px; color: var(--muted); font-size: 13px;
  }
  .summary-cards {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px; margin-bottom: 28px;
  }
  .summary-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
  }
  .summary-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .summary-card .value { font-size: 24px; font-weight: 600; margin-top: 4px; }
  .summary-card .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .stats-section {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px; margin-bottom: 16px;
  }
  .stats-section h3 {
    margin: 0 0 12px; font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted);
  }

  .points-chart {
    display: flex; align-items: flex-end; gap: 8px;
    height: 160px; padding: 8px 0;
  }
  .points-chart .bar-col {

<script>
(() => {
  const SUPABASE_URL = "https://icxwnryqyffvmxscwfcv.supabase.co";
  const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_kw2DYRs7qCPz74v-tzR12w_TDreloum";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
  });

  const FOCUS_CAP = 5;  // per context (Work / Personal each get their own cap)
  // Count live focus tasks in a given context — the cap is enforced per-context.
  function focusCountFor(ctx) {
    return state.tasks.filter(t => t.status === "focus" && !t.archived && t.context === ctx).length;
  }
  const TIMING_LABEL = {
    "today": "Today",
    "tomorrow": "Tomorrow",
    "this-week": "This Week",
    "next-30-days": "Next 30d",
  };
  const POINTS = { S: 1, M: 2, L: 5, XL: 10 };
  const HISTORY_WEEKS = 12;

  const GROUP_BY = {
    status: {
      columns: [
        { id: "inbox",       label: "Inbox" },
        { id: "not-started", label: "Not started" },
        { id: "in-progress", label: "In Progress" },
        { id: "focus",       label: "Focus" },
        { id: "done",        label: "Done" },
      ],
      field: "status",
      extract: t => t.status,
      droppable: true,
    },
    timing: {
      columns: [
        { id: "today",        label: "Today" },
        { id: "tomorrow",     label: "Tomorrow" },
        { id: "this-week",    label: "This Week" },
        { id: "next-30-days", label: "Next 30 days" },
        { id: "__none__",     label: "—" },
      ],
      field: "timing",
      extract: t => t.timing || "__none__",
      droppable: true,
    },
    staleness: {
      columns: [
        { id: "fresh",      label: "Fresh" },
        { id: "stale",      label: "Stale" },
        { id: "very-stale", label: "Very Stale" },
      ],
      field: null,
      extract: t => t.staleness?.level || null,
      droppable: false,
    },
    context: {
      columns: [
        { id: "Personal", label: "Personal" },
        { id: "Work",     label: "Work" },
        { id: "__none__", label: "—" },
      ],
      field: "context",
      extract: t => t.context || "__none__",
      droppable: true,
    },
  };

  const now = () => new Date().toISOString();
  const statusEl = document.getElementById("status");
  const setStatus = (msg) => { statusEl.textContent = msg || ""; };

  let currentUser = null;
  let focusedTaskId = null;
  const FOCUS_ORDER_KEY = 'kanban.focusOrder';
  function loadFocusOrder() {
    try {
      const v = JSON.parse(localStorage.getItem(FOCUS_ORDER_KEY) || '[]');
      return Array.isArray(v) ? v : [];
    } catch { return []; }
  }
  function saveFocusOrder() {
    try { localStorage.setItem(FOCUS_ORDER_KEY, JSON.stringify(state.focusOrder)); } catch {}
  }

  // Collapsed state for the sidebar Work/Personal folders (persisted).
  const PROJECT_FOLDERS_KEY = 'kanban.projectFoldersCollapsed';
  function loadFoldersCollapsed() {
    try {
      const v = JSON.parse(localStorage.getItem(PROJECT_FOLDERS_KEY) || '{}');
      return (v && typeof v === 'object') ? v : {};
    } catch { return {}; }
  }
  function saveFoldersCollapsed() {
    try { localStorage.setItem(PROJECT_FOLDERS_KEY, JSON.stringify(projectFoldersCollapsed)); } catch {}
  }
  let projectFoldersCollapsed = loadFoldersCollapsed();

  let state = {
    tasks: [],
    filter: { context: "all", timing: "all", staleness: "all", needsEffort: false },
    groupBy: "status",
    view: "today",
    project: null,            // null = All Tasks (top-level); otherwise a project (parent task) id
    focusOrder: loadFocusOrder(),
  };

  // === Project / parent hierarchy (2-level: project -> task) ===
  function childrenOf(id) {
    return state.tasks.filter(t => t.parentId === id && !t.archived);
  }
  function isProject(t) {
    return !t.parentId && childrenOf(t.id).length > 0;
  }
  function projectProgress(id) {
    const kids = childrenOf(id);
    return { done: kids.filter(c => c.status === 'done').length, total: kids.length };
  }
  // Top-level projects (have children), most-recently-updated first.
  function allProjects() {
    return state.tasks
      .filter(t => isProject(t) && !t.archived)
      .sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
  }
  function projectById(id) {
    return state.tasks.find(t => t.id === id) || null;
  }

  // === Auth ===
  function showAuth() {
    document.getElementById('auth').hidden = false;
    document.querySelector('header').hidden = true;
    document.getElementById('sidebar').hidden = true;
    document.getElementById('toolbar').hidden = true;
    document.getElementById('board').hidden = true;
  }
  function showApp() {
    document.getElementById('auth').hidden = true;
    document.querySelector('header').hidden = false;
    document.getElementById('sidebar').hidden = false;
    applyView();
  }

  function applyView() {
    const isToday = state.view === 'today';
    const isBoard = state.view === 'board';
    const isFocus = state.view === 'focus';
    const isStats = state.view === 'stats';
    const isKanbanPage = isBoard || isFocus;

    document.getElementById('toolbar').hidden = !isBoard;
    document.getElementById('stats-strip').hidden = !isBoard;
    if (!isBoard) document.getElementById('project-bar').hidden = true;
    document.getElementById('today-view').hidden = !isToday;
    document.getElementById('board').hidden = !isBoard;
    document.getElementById('focus-view').hidden = !isFocus;
    document.getElementById('stats-page').hidden = !isStats;

    document.getElementById('page-title').textContent =
      isToday ? 'Today' : isStats ? 'Task Management' : 'Kanban';
    const focusBtn = document.getElementById('focus-btn');
    focusBtn.hidden = !isKanbanPage;
    focusBtn.classList.toggle('active', isFocus);

    document.querySelectorAll('#sidebar .sidebar-item').forEach(b => {
      const isActive = (b.dataset.target === 'today' && isToday)
                    || (b.dataset.target === 'kanban' && isKanbanPage)
                    || (b.dataset.target === 'stats' && isStats);
      b.classList.toggle('active', isActive);
    });

    updateFocusBtnCount();
    syncHeaderCtx();
    renderSidebarProjects();

    if (isToday) {
      renderToday();
    } else if (isBoard) {
      renderStatsStrip();
      render();
    } else if (isFocus) {
      renderFocus();
    } else {
      renderStatsPage();
    }
  }

  function updateFocusBtnCount() {
    const ctx = state.filter.context;
    const n = state.tasks.filter(t =>
      t.status === 'focus' && (ctx === 'all' || t.context === ctx)
    ).length;
    document.getElementById('focus-btn-count').textContent = n;
  }

  async function initAuth() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      currentUser = session.user;
      showApp();
      loadTasks();
    } else {
      showAuth();
    }
    supabase.auth.onAuthStateChange((event, session) => {
      if ((event === 'SIGNED_IN' || event === 'INITIAL_SESSION') && session) {
        if (currentUser?.id !== session.user.id) {
          currentUser = session.user;
          showApp();
          loadTasks();
        }
      } else if (event === 'SIGNED_OUT') {
        currentUser = null;
        state.tasks = [];
        state.filter = { context: "all", timing: "all", staleness: "all", needsEffort: false };
        state.view = "today";
        showAuth();
      }
    });
  }

  document.getElementById('auth-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = e.target.querySelector('input[type="email"]').value.trim();
    const password = e.target.querySelector('input[type="password"]').value;
    const msg = document.getElementById('auth-msg');
    msg.className = 'auth-msg';
    msg.textContent = 'Signing in...';
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      msg.className = 'auth-msg error';
      msg.textContent = error.message;
    } else {
      msg.className = 'auth-msg success';
      msg.textContent = 'Signed in.';
    }
  });

  document.getElementById('sign-out').addEventListener('click', async () => {
    await supabase.auth.signOut();
  });

  // === Data transform ===
  function rowToTask(row) {
    return {
      id: row.id,
      title: row.title,
      description: row.description || "",
      status: row.status,
      context: row.context,
      source: row.source,
      sourceLink: row.source_link,
      timing: row.timing,
      effort: row.effort,
      parentId: row.parent_id || null,
      subtasks: Array.isArray(row.subtasks) ? row.subtasks : [],
      staleness: computeStaleness(row.created_at),
      createdAt: row.created_at,
      updatedAt: row.updated_at,
      completedAt: row.completed_at,
      archived: !!row.archived,
    };
  }
  function patchToRow(patch) {
    const row = {};
    if ('title' in patch) row.title = patch.title;
    if ('description' in patch) row.description = patch.description;
    if ('status' in patch) row.status = patch.status;
    if ('context' in patch) row.context = patch.context;
    if ('source' in patch) row.source = patch.source;
    if ('sourceLink' in patch) row.source_link = patch.sourceLink;
    if ('timing' in patch) row.timing = patch.timing;
    if ('effort' in patch) row.effort = patch.effort;
    if ('parentId' in patch) row.parent_id = patch.parentId;
    if ('subtasks' in patch) row.subtasks = patch.subtasks;
    if ('archived' in patch) row.archived = patch.archived;
    if ('createdAt' in patch) row.created_at = patch.createdAt;
    return row;
  }
  function computeStaleness(iso) {
    if (!iso) return null;
    const days = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
    if (days < 7) return { label: "Fresh", level: "fresh" };
    if (days < 30) return { label: "Stale", level: "stale" };
    return { label: "Very Stale", level: "very-stale" };
  }

  // === Data layer ===
  // === Weekly Focus reset (on-open rollover) ===
  // Each new week (after Sunday 6pm local), move Focus tasks back to In Progress
  // exactly once, the next time the app is opened.
  const WEEKLY_RESET_KEY = 'kanban.lastFocusReset';
  function lastFocusResetBoundary() {
    const now = new Date();
    const sunday = new Date(now);
    sunday.setDate(now.getDate() - now.getDay());   // most recent Sunday (Sun=0)
    sunday.setHours(18, 0, 0, 0);                    // 6pm
    if (now < sunday) sunday.setDate(sunday.getDate() - 7);  // not past this Sunday 6pm yet
    return sunday;
  }
  function maybeWeeklyFocusReset() {
    const key = lastFocusResetBoundary().toISOString();
    let last = null;
    try { last = localStorage.getItem(WEEKLY_RESET_KEY); } catch {}
    if (last === key) return;                        // already rolled over this week
    try { localStorage.setItem(WEEKLY_RESET_KEY, key); } catch {}
    if (last === null) return;                       // first run on this device — don't sweep retroactively
    const toReset = state.tasks.filter(t => t.status === 'focus' && !t.archived);
    if (!toReset.length) return;
    for (const t of toReset) {                        // optimistic local update
      const idx = state.tasks.findIndex(x => x.id === t.id);
      if (idx >= 0) state.tasks[idx] = { ...state.tasks[idx], status: 'in-progress', updatedAt: now() };
    }
    Promise.all(toReset.map(t => updateTaskRow(t.id, { status: 'in-progress' }))).catch(() => {});
    flashStatus(`New week — moved ${toReset.length} Focus task${toReset.length === 1 ? '' : 's'} back to In Progress`);
  }

  async function loadTasks() {
    setStatus("Loading…");
    const { data, error } = await supabase
      .from('tasks')
      .select('*')
      .order('updated_at', { ascending: false });
    if (error) {
      setStatus("Load failed");
      alert("Could not load tasks: " + error.message);
      return;
    }
    state.tasks = data.map(rowToTask);
    setStatus("");
    maybeWeeklyFocusReset();   // start each week with a clean Focus (optimistic; persists in bg)
    applyView();               // render the current view (today / board / focus / stats) with loaded data
  }

  async function createTaskRow({ title, status, context, source, timing, parentId }) {
    const row = { title, status, context, source, user_id: currentUser.id };
    if (timing) row.timing = timing;
    if (parentId) row.parent_id = parentId;
    if (status === 'focus' && !row.timing) row.timing = 'today';
    const { data, error } = await supabase
      .from('tasks')
      .insert(row)
      .select()
      .single();
    if (error) throw new Error(error.message);
    return rowToTask(data);
  }

  async function updateTaskRow(id, patch) {
    const { data, error } = await supabase
      .from('tasks')
      .update(patchToRow(patch))
      .eq('id', id)
      .select()
      .single();
    if (error) throw new Error(error.message);
    return rowToTask(data);
  }

  async function deleteTaskRow(id) {
    const { error } = await supabase.from('tasks').delete().eq('id', id);
    if (error) throw new Error(error.message);
  }

  // Re-insert a previously-deleted task verbatim (used by undo).
  async function insertTaskRow(task) {
    const row = {
      id: task.id, user_id: currentUser.id, title: task.title,
      status: task.status, context: task.context || null, source: task.source || null,
      source_link: task.sourceLink || null, description: task.description || null,
      timing: task.timing || null, effort: task.effort || null,
      parent_id: task.parentId || null,
      subtasks: task.subtasks || [], archived: !!task.archived,
      created_at: task.createdAt, updated_at: task.updatedAt,
    };
    const { data, error } = await supabase.from('tasks').insert(row).select().single();
    if (error) throw new Error(error.message);
    let result = rowToTask(data);
    // The set_completed_at trigger may rewrite completed_at on insert; restore the original.
    if ((task.completedAt || null) !== (data.completed_at || null)) {
      const { data: d2 } = await supabase.from('tasks')
        .update({ completed_at: task.completedAt || null }).eq('id', task.id).select().single();
      if (d2) result = rowToTask(d2);
    }
    return result;
  }
  async function restoreTask(task) {
    const restored = await insertTaskRow(task);
    state.tasks.unshift(restored);
    afterMutation(restored.id);
  }

  // === View helpers ===
  function visibleTasks() {
    const { context, timing, staleness, needsEffort } = state.filter;
    return state.tasks.filter(t => {
      if (t.archived) return false;
      // Project scope: a selected project shows only its children;
      // "All Tasks" (project === null) shows top-level items and hides children.
      if (state.project) {
        if (t.parentId !== state.project) return false;
      } else if (t.parentId) {
        return false;
      }
      if (needsEffort) {
        if (t.context !== "Work") return false;
        if (t.status === "done") return false;
        if (t.effort) return false;
        return true;
      }
      if (context !== "all" && t.context !== context) return false;
      if (timing !== "all" && t.timing !== timing) return false;
      if (staleness !== "all" && (t.staleness?.level || null) !== staleness) return false;
      return true;
    });
  }

  function currentGrouping() {
    return GROUP_BY[state.groupBy] || GROUP_BY.status;
  }

  function visibleTasksInOrder() {
    const grouping = currentGrouping();
    const tasks = visibleTasks();
    const result = [];
    for (const col of grouping.columns) {
      result.push(...tasks.filter(t => grouping.extract(t) === col.id));
    }
    return result;
  }

  function focusCard(id, { scroll = true } = {}) {
    focusedTaskId = id;
    document.querySelectorAll(".card.focused").forEach(c => c.classList.remove("focused"));
    if (!id) return;
    const el = document.querySelector(`.card[data-id="${CSS.escape(id)}"]`);
    if (el) {
      el.classList.add("focused");
      if (scroll) el.scrollIntoView({ block: "nearest", inline: "nearest", behavior: "smooth" });
    }
  }

  function moveFocus(delta) {
    const ordered = visibleTasksInOrder();
    if (!ordered.length) return;
    const idx = ordered.findIndex(t => t.id === focusedTaskId);
    const next = idx < 0 ? 0 : Math.max(0, Math.min(ordered.length - 1, idx + delta));
    focusCard(ordered[next].id);
  }

  // === Rendering ===
  const board = document.getElementById("board");

  function renderSidebarProjects() {
    const list = document.getElementById("project-list");
    if (!list) return;
    // Drop a stale selection (project deleted or no longer has children).
    if (state.project && !projectById(state.project)) state.project = null;
    const ctx = state.filter.context;   // 'all' | 'Work' | 'Personal'
    const projects = allProjects();
    list.innerHTML = "";

    const makeProjectBtn = (p) => {
      const { done, total } = projectProgress(p.id);
      const btn = document.createElement("button");
      btn.className = "sidebar-item project-item project-child";
      btn.dataset.project = p.id;
      btn.dataset.target = "kanban";
      btn.innerHTML = `<span class="icon">📁</span> <span class="project-name">${escapeHtml(p.title)}</span>`
        + `<span class="project-progress${done === total ? ' complete' : ''}">${done}/${total}</span>`;
      return btn;
    };
    const addFolder = (key, icon, items, selectable) => {
      const collapsed = !!projectFoldersCollapsed[key];
      const folder = document.createElement("button");
      folder.className = "sidebar-item folder-item";
      folder.dataset.folder = key;
      folder.innerHTML = `<span class="folder-caret">${collapsed ? '▸' : '▾'}</span>`
        + `<span class="icon">${icon}</span> <span class="project-name">${escapeHtml(key)}</span>`
        + `<span class="project-progress">${items.length}</span>`;
      list.appendChild(folder);
      if (!collapsed) {
        const wrap = document.createElement("div");
        wrap.className = "folder-children";
        if (items.length) items.forEach(p => wrap.appendChild(makeProjectBtn(p)));
        else {
          const e = document.createElement("div");
          e.className = "folder-empty";
          e.textContent = "No projects yet";
          wrap.appendChild(e);
        }
        list.appendChild(wrap);
      }
    };

    addFolder("Work", "💼", projects.filter(p => p.context === 'Work'), true);
    addFolder("Personal", "🏠", projects.filter(p => p.context === 'Personal'), true);
    const noCtx = projects.filter(p => p.context !== 'Work' && p.context !== 'Personal');
    if (noCtx.length) addFolder("No context", "📂", noCtx, false);

    // Active highlights: a selected project, its parent context folder, or All Tasks.
    document.querySelectorAll('#sidebar .project-child').forEach(b => {
      b.classList.toggle('active', b.dataset.project === state.project);
    });
    document.querySelectorAll('#sidebar .folder-item').forEach(b => {
      b.classList.toggle('active', !state.project && b.dataset.folder === ctx);
    });
    const allBtn = document.querySelector('#sidebar .project-item[data-project=""]');
    if (allBtn) allBtn.classList.toggle('active', !state.project && ctx === 'all');
  }

  function renderProjectBar() {
    const bar = document.getElementById("project-bar");
    if (!bar) return;
    const proj = state.project ? projectById(state.project) : null;
    if (!proj) { bar.hidden = true; bar.innerHTML = ""; return; }
    const { done, total } = projectProgress(proj.id);
    bar.hidden = false;
    bar.innerHTML = `
      <button class="project-back" id="project-back" title="Back to all tasks">← All Tasks</button>
      <span class="project-bar-sep">/</span>
      <span class="project-bar-title">📁 ${escapeHtml(proj.title)}</span>
      <span class="project-bar-progress${done === total && total ? ' complete' : ''}">${done}/${total} done</span>
    `;
    bar.querySelector("#project-back").addEventListener("click", () => {
      state.project = null;
      applyView();
    });
  }

  function render() {
    renderSidebarProjects();
    renderProjectBar();
    board.innerHTML = "";
    const grouping = currentGrouping();
    const tasks0 = visibleTasks();
    if (focusedTaskId && !tasks0.some(t => t.id === focusedTaskId)) focusedTaskId = null;
    if (!focusedTaskId && tasks0.length) focusedTaskId = visibleTasksInOrder()[0]?.id || null;
    board.style.gridTemplateColumns = `repeat(${grouping.columns.length}, minmax(240px, 1fr))`;
    for (const col of grouping.columns) {
      const tasks = tasks0.filter(t => grouping.extract(t) === col.id);
      const colEl = document.createElement("section");
      colEl.className = "col";
      if (state.groupBy === "status") colEl.dataset.status = col.id;
      const isFocusCol = state.groupBy === "status" && col.id === "focus";
      let overCap = false;
      let countLabel = `${tasks.length}`;
      if (isFocusCol) {
        if (state.filter.context !== "all") {
          // Viewing a single context — tasks are already scoped to it.
          overCap = tasks.length > FOCUS_CAP;
          countLabel = `${tasks.length}/${FOCUS_CAP}`;
        } else {
          // "All" view — cap is per-context, so flag if any one context is over.
          overCap = focusCountFor("Work") > FOCUS_CAP || focusCountFor("Personal") > FOCUS_CAP;
          countLabel = `${tasks.length}`;
        }
      }
      if (overCap) colEl.classList.add("over-cap");
      const addBtn = state.groupBy === "status"
        ? `<button class="add" data-add="${col.id}">+ Add task</button>` : "";
      colEl.innerHTML = `
        <div class="col-head">
          <div class="col-title"><span class="dot"></span>${col.label}</div>
          <span class="count">${countLabel}</span>
        </div>
        <div class="cards"></div>
        ${addBtn}
      `;
      const cardsEl = colEl.querySelector(".cards");

      if (tasks.length === 0) {
        const e = document.createElement("div");
        e.className = "empty";
        e.textContent = "No tasks";
        cardsEl.appendChild(e);
      } else {
        for (const t of tasks) cardsEl.appendChild(renderCard(t));
      }

      if (grouping.droppable) {
        cardsEl.addEventListener("dragover", (e) => {
          e.preventDefault();
          cardsEl.classList.add("drag-over");
        });
        cardsEl.addEventListener("dragleave", () => cardsEl.classList.remove("drag-over"));
        cardsEl.addEventListener("drop", (e) => {
          e.preventDefault();
          cardsEl.classList.remove("drag-over");
          const id = e.dataTransfer.getData("text/plain");
          const task = state.tasks.find(t => t.id === id);
          if (!task) return;
          if (grouping.extract(task) === col.id) return;
          if (state.groupBy === "status" && col.id === "focus") {
            const ctx = task.context;
            if (focusCountFor(ctx) >= FOCUS_CAP) {
              setStatus(`${ctx || "Uncategorized"} Focus cap (${FOCUS_CAP}) reached — drop one before adding`);
              setTimeout(() => setStatus(""), 3000);
              return;
            }
          }
          const value = col.id === "__none__" ? null : col.id;
          patchTask(task.id, { [grouping.field]: value });
        });
      }

      const addBtnEl = colEl.querySelector(".add");
      if (addBtnEl) addBtnEl.addEventListener("click", () => openNewInput(col.id, colEl));
      board.appendChild(colEl);
    }
    if (focusedTaskId) {
      const el = document.querySelector(`.card[data-id="${CSS.escape(focusedTaskId)}"]`);
      if (el) el.classList.add("focused");
    }
  }

  const STALENESS_RANK = { "very-stale": 3, "stale": 2, "fresh": 1 };

  const EFFORT_GROUPS = [
    { key: 'S',  label: 'Small' },
    { key: 'M',  label: 'Medium' },
    { key: 'L',  label: 'Large' },
    { key: 'XL', label: 'XL' },
    { key: null, label: 'No estimate' },
  ];

  function syncFocusOrder(focusTasks) {
    const focusIds = new Set(focusTasks.map(t => t.id));
    let dirty = false;
    const filtered = state.focusOrder.filter(id => {
      if (focusIds.has(id)) return true;
      dirty = true;
      return false;
    });
    const known = new Set(filtered);
    for (const t of focusTasks) {
      if (!known.has(t.id)) { filtered.push(t.id); dirty = true; }
    }
    state.focusOrder = filtered;
    if (dirty) saveFocusOrder();
  }

  function sortByFocusOrder(tasks) {
    const idx = new Map(state.focusOrder.map((id, i) => [id, i]));
    return tasks.slice().sort((a, b) => {
      const ai = idx.has(a.id) ? idx.get(a.id) : Infinity;
      const bi = idx.has(b.id) ? idx.get(b.id) : Infinity;
      return ai - bi;
    });
  }

  // === Today view (clean daily sandbox) ===
  const POOL_STATUS_ORDER = { 'in-progress': 0, 'not-started': 1, 'inbox': 2 };

  function renderToday() {
    const root = document.getElementById('today-view');
    const ctx = state.filter.context;
    const inContext = (t) => ctx === 'all' || t.context === ctx;
    // Focus = what you're committed to today.
    const focus = state.tasks.filter(t => !t.archived && inContext(t) && t.status === 'focus');
    // Pool = actionable items you could pull into focus: not done, not already
    // focused, and not a project container (you focus its tasks, not the wrapper).
    const byDueThenStatus = (a, b) => {
      const ad = a.timing === 'today' ? 0 : 1, bd = b.timing === 'today' ? 0 : 1;
      if (ad !== bd) return ad - bd;
      return (POOL_STATUS_ORDER[a.status] ?? 3) - (POOL_STATUS_ORDER[b.status] ?? 3);
    };
    const poolTasks = state.tasks.filter(t =>
      !t.archived && inContext(t) && t.status !== 'focus' && t.status !== 'done' && !isProject(t));
    // Standalone tasks render flat; subtasks group under their project.
    const standalone = poolTasks.filter(t => !t.parentId).sort(byDueThenStatus);
    const byParent = new Map();
    for (const t of poolTasks) {
      if (!t.parentId) continue;
      (byParent.get(t.parentId) || byParent.set(t.parentId, []).get(t.parentId)).push(t);
    }
    const projectGroups = [...byParent.keys()]
      .map(pid => ({ project: state.tasks.find(p => p.id === pid), kids: byParent.get(pid).sort(byDueThenStatus) }))
      .filter(g => g.project)
      .sort((a, b) => (a.project.title || '').localeCompare(b.project.title || ''));

    const dateStr = new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
    const dot = (t) =>
      t.context === 'Work' ? `<span class="ctx-ico" title="Work">💼</span>`
      : t.context === 'Personal' ? `<span class="ctx-ico" title="Personal">🏠</span>`
      : `<span class="ctx-ico ctx-none" title="No context">·</span>`;
    const dueChip = (t) => t.timing === 'today'
      ? `<span class="today-due now">today</span>`
      : (t.timing ? `<span class="today-due">${escapeHtml(TIMING_LABEL[t.timing] || t.timing)}</span>` : '');

    const parentTitleOf = (t) => {
      if (!t.parentId) return null;
      const p = state.tasks.find(x => x.id === t.parentId);
      return p ? p.title : null;
    };
    const focusCard = (t) => {
      const par = parentTitleOf(t);
      return `
      <li class="today-card focus${t.parentId ? ' subtask' : ''}" data-demote="${escapeHtml(t.id)}" title="Click to move back to In Progress">
        ${dot(t)}<span class="today-card-title">${par ? `<span class="today-bc">${escapeHtml(par)} › </span>` : ''}${escapeHtml(t.title) || '<em>Untitled</em>'}</span>
        <button class="today-edit" data-open="${escapeHtml(t.id)}" title="Open details">✎</button>
        <button class="today-del" data-del="${escapeHtml(t.id)}" title="Delete task">×</button>
      </li>`;
    };
    const poolCard = (t) => `
      <li class="today-card${t.parentId ? ' subtask' : ''}" data-promote="${escapeHtml(t.id)}" title="Click to move into Focus">
        ${dot(t)}<span class="today-card-title">${escapeHtml(t.title) || '<em>Untitled</em>'}</span>
        ${dueChip(t)}
        <button class="today-edit" data-open="${escapeHtml(t.id)}" title="Open details">✎</button>
        <button class="today-del" data-del="${escapeHtml(t.id)}" title="Delete task">×</button>
      </li>`;
    const groupHeader = (g) => `
      <li class="today-group" data-open="${escapeHtml(g.project.id)}" title="Open project to edit">
        <span class="today-group-name">📁 ${escapeHtml(g.project.title)}</span>
        <span class="today-group-count">${g.kids.length}</span>
        <button class="today-del" data-del="${escapeHtml(g.project.id)}" title="Delete project + its subtasks">×</button>
      </li>`;

    const poolCount = poolTasks.length;
    const poolBody = poolCount
      ? standalone.map(poolCard).join('')
        + projectGroups.map(g => groupHeader(g) + g.kids.map(poolCard).join('')).join('')
      : `<li class="today-empty">Nothing waiting — add one above. 🎉</li>`;

    root.innerHTML = `
      <div class="today-wrap">
        <div class="today-head">
          <h2 class="today-title">Today</h2>
          <span class="today-date">${escapeHtml(dateStr)}</span>
        </div>
        <div class="today-grid">
          <section class="today-pane">
            <div class="today-pane-head"><span>🎯 Focus</span><span class="today-pane-count">${focus.length}</span></div>
            <ul class="today-list">
              ${focus.length ? focus.map(focusCard).join('') : `<li class="today-empty">Pick from the right → to focus on it today.</li>`}
            </ul>
          </section>
          <section class="today-pane">
            <div class="today-add">
              <input id="today-add-input" type="text" placeholder="+ Add a task…" autocomplete="off" />
            </div>
            <div class="today-pane-head"><span>Available</span><span class="today-pane-count">${poolCount}</span></div>
            <ul class="today-list">${poolBody}</ul>
          </section>
        </div>
      </div>`;
  }

  function promoteToFocus(id) {
    const t = state.tasks.find(x => x.id === id);
    if (!t) return;
    if (focusCountFor(t.context) >= FOCUS_CAP) {
      flashStatus(`${t.context || 'Uncategorized'} Focus is full (${FOCUS_CAP}) — finish or drop one first`);
      return;
    }
    patchTask(id, { status: 'focus' });   // patchTask auto-sets timing=today for focus
  }

  async function quickAddToday(raw) {
    const v = (raw || '').trim();
    if (!v) return;
    const ctx = (state.filter.context === 'Work' || state.filter.context === 'Personal')
      ? state.filter.context : 'Personal';
    try {
      const created = await createTaskRow({ title: v, status: 'not-started', context: ctx, source: 'Manual' });
      state.tasks.unshift(created);
      afterMutation();
      recordUndo({
        label: `add "${truncate(created.title)}"`,
        undo: () => deleteTask(created.id),
        redo: () => restoreTask(created),
      });
      const input = document.getElementById('today-add-input');
      if (input) input.focus();
    } catch (e) {
      alert('Could not add task: ' + e.message);
    }
  }

  function setupToday() {
    const root = document.getElementById('today-view');
    root.addEventListener('click', (e) => {
      const del = e.target.closest('[data-del]');
      if (del) { deleteTask(del.dataset.del); return; }
      const edit = e.target.closest('[data-open]');
      if (edit) { openDrawer(edit.dataset.open); return; }
      const promote = e.target.closest('[data-promote]');
      if (promote) { promoteToFocus(promote.dataset.promote); return; }
      const demote = e.target.closest('[data-demote]');
      if (demote) { patchTask(demote.dataset.demote, { status: 'in-progress' }); return; }
    });
    root.addEventListener('keydown', (e) => {
      if (e.target.id === 'today-add-input' && e.key === 'Enter') {
        e.preventDefault();
        const val = e.target.value;
        e.target.value = '';
        quickAddToday(val);
      }
    });
  }

  function renderFocus() {
    const root = document.getElementById('focus-view');
    const ctx = state.filter.context;
    const inContext = (t) => ctx === "all" || t.context === ctx;
    // Sync + sort against the FULL focus set so the saved ordering for the
    // hidden context isn't pruned, then narrow to the active context for display.
    const allFocus = state.tasks.filter(t => t.status === 'focus');
    syncFocusOrder(allFocus);
    let focusTasks = sortByFocusOrder(allFocus).filter(inContext);

    const todayStart = new Date();
    todayStart.setHours(0, 0, 0, 0);
    const doneTasks = state.tasks
      .filter(t => t.status === 'done' && !t.archived && inContext(t) && t.completedAt && new Date(t.completedAt) >= todayStart)
      .sort((a, b) => new Date(b.completedAt) - new Date(a.completedAt));

    const cardHtml = (task) => {
      const badges = [];
      if (task.timing) {
        const label = TIMING_LABEL[task.timing] || task.timing;
        badges.push(`<span class="badge timing timing-${task.timing}">${escapeHtml(label)}</span>`);
      }
      if (task.staleness) {
        badges.push(`<span class="badge staleness stale-${task.staleness.level}">${escapeHtml(task.staleness.label)}</span>`);
      }
      return `
        <li class="focus-card" draggable="true" data-id="${escapeHtml(task.id)}">
          <div class="focus-card-title">${escapeHtml(task.title)}</div>
          ${badges.length ? `<div class="focus-card-badges">${badges.join('')}</div>` : ''}
        </li>
      `;
    };

    const groups = new Map(EFFORT_GROUPS.map(g => [g.key, []]));
    for (const t of focusTasks) {
      const key = ['S','M','L','XL'].includes(t.effort) ? t.effort : null;
      groups.get(key).push(t);
    }

    const focusSectionsHtml = EFFORT_GROUPS.map(g => {
      const tasks = groups.get(g.key);
      const dataEffort = g.key === null ? '' : g.key;
      const body = tasks.length
        ? tasks.map(cardHtml).join('')
        : `<li class="focus-section-empty">drop here</li>`;
      return `
        <div class="focus-section" data-effort="${dataEffort}">
          <div class="focus-section-head">
            <span class="focus-section-label">${g.label}</span>
            <span class="focus-section-count">${tasks.length}</span>
          </div>
          <ul class="focus-list focus-section-list">${body}</ul>
        </div>
      `;
    }).join('');

    const doneList = doneTasks.length
      ? doneTasks.map(t => `
        <li class="focus-card done" draggable="true" data-id="${escapeHtml(t.id)}">
          <div class="focus-card-title">${escapeHtml(t.title)}</div>
        </li>
      `).join('')
      : `<div class="focus-empty">Drag tasks here to complete them.</div>`;

    root.innerHTML = `
      <div class="focus-wrap">
        <div class="focus-grid">
          <div class="focus-col focus-col-todo" data-status="focus">
            <div class="focus-col-head">
              <div class="focus-col-title">Focus</div>
              <div class="focus-col-count">${focusTasks.length} ${focusTasks.length === 1 ? 'task' : 'tasks'}</div>
            </div>
            <div class="focus-sections">${focusSectionsHtml}</div>
          </div>
          <div class="focus-col focus-col-done" data-status="done">
            <div class="focus-col-head">
              <div class="focus-col-title">Done today</div>
              <div class="focus-col-count">${doneTasks.length}</div>
            </div>
            <ul class="focus-list">${doneList}</ul>
          </div>
        </div>
      </div>
    `;

    const clearIndicators = () => {
      root.querySelectorAll('.drop-before, .drop-after, .drag-over-section, .drag-over')
        .forEach(el => el.classList.remove('drop-before', 'drop-after', 'drag-over-section', 'drag-over'));
    };

    root.querySelectorAll('.focus-card').forEach(el => {
      const id = el.dataset.id;
      el.addEventListener('dragstart', (e) => {
        e.dataTransfer.setData('text/plain', id);
        e.dataTransfer.effectAllowed = 'move';
        el.classList.add('dragging');
      });
      el.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        clearIndicators();
      });
      el.addEventListener('click', () => {
        if (el.classList.contains('dragging')) return;
        openDrawer(id);
      });
    });

    root.querySelectorAll('.focus-col-todo .focus-card').forEach(el => {
      el.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.stopPropagation();
        e.dataTransfer.dropEffect = 'move';
        const rect = el.getBoundingClientRect();
        const isAbove = (e.clientY - rect.top) < rect.height / 2;
        clearIndicators();
        el.classList.add(isAbove ? 'drop-before' : 'drop-after');
      });
      el.addEventListener('drop', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const draggedId = e.dataTransfer.getData('text/plain');
        const targetId = el.dataset.id;
        const rect = el.getBoundingClientRect();
        const isAbove = (e.clientY - rect.top) < rect.height / 2;
        const targetEffort = el.closest('.focus-section')?.dataset.effort || null;
        clearIndicators();
        if (!draggedId) return;
        const dragged = state.tasks.find(t => t.id === draggedId);
        if (!dragged) return;
        if (dragged.status !== 'focus') {
          patchTask(draggedId, { status: 'focus' });
          return;
        }
        reorderFocus(draggedId, targetId, isAbove, targetEffort || null);
      });
    });

    root.querySelectorAll('.focus-col-todo .focus-section').forEach(sec => {
      const effort = sec.dataset.effort || null;
      sec.addEventListener('dragover', (e) => {
        if (e.target.closest('.focus-card')) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        sec.classList.add('drag-over-section');
      });
      sec.addEventListener('dragleave', (e) => {
        if (!sec.contains(e.relatedTarget)) sec.classList.remove('drag-over-section');
      });
      sec.addEventListener('drop', (e) => {
        if (e.target.closest('.focus-card')) return;
        e.preventDefault();
        sec.classList.remove('drag-over-section');
        const draggedId = e.dataTransfer.getData('text/plain');
        if (!draggedId) return;
        const dragged = state.tasks.find(t => t.id === draggedId);
        if (!dragged) return;
        if (dragged.status !== 'focus') {
          const patch = { status: 'focus' };
